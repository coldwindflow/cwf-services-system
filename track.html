<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CWF - ติดตามสถานะงาน</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/mainfest.json">
  <meta name="theme-color" content="#0b4bb3">

  <style>
    /* =====================================================
       🧾 E-Slip (Customer Tracking Page Only)
       - แก้เฉพาะการแสดงผลเอกสารฝั่งลูกค้าเท่านั้น
       - ไม่กระทบ logic/สถานะ/ฐานข้อมูล/endpoint ใด ๆ
       ===================================================== */
    .eslip-wrap{ margin-top:12px; }
    .eslip{
      background:#ffffff;
      border:1px solid rgba(15,23,42,0.10);
      border-radius:16px;
      padding:14px;
      box-shadow: 0 10px 24px rgba(2,6,23,0.08);
    }
    .eslip-head{ text-align:center; }
    .eslip-head .h1{ font-weight:900; font-size:18px; }
    .eslip-head .h2{ margin-top:4px; font-weight:800; font-size:14px; color:#0f172a; }
    .eslip-meta{ display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .eslip-meta .box{ padding:10px 12px; border:1px solid rgba(15,23,42,0.10); border-radius:12px; background:rgba(37,99,235,0.04); }
    .eslip-table{ width:100%; border-collapse:collapse; margin-top:12px; }
    .eslip-table th,.eslip-table td{ border:1px solid rgba(15,23,42,0.10); padding:8px; font-size:13px; }
    .eslip-table th{ background: rgba(37,99,235,0.08); text-align:left; }
    .eslip-sum{ margin-top:10px; padding:10px 12px; border:1px solid rgba(15,23,42,0.10); border-radius:12px; background:#fff; }
    .eslip-sum .row{ display:flex; justify-content:space-between; gap:10px; margin:6px 0; }
    .eslip-sum .total{ font-size:18px; font-weight:900; }
    .eslip-foot{ margin-top:12px; text-align:center; color:#475569; font-size:12.5px; line-height:1.45; }
  
    .eslip-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:10px; flex-wrap:wrap; }
    .eslip-actions button{ width:auto; min-height:40px; padding:10px 12px; }
    .eslip-logo{ width: min(220px, 55vw); height:auto; max-height:90px; object-fit:contain; display:block; margin:0 auto 8px; }

    /* 🖨️ Print: พิมพ์เฉพาะเอกสาร E-Slip */
    @media print{
      body *{ visibility:hidden !important; }
      #docMount, #docMount *{ visibility:visible !important; }
      #docMount{ position:fixed; left:0; top:0; width:100%; margin:0; padding:0; }
      .eslip{ box-shadow:none !important; border:none !important; border-radius:0 !important; }
      .eslip-actions{ display:none !important; }
      .topbar{ display:none !important; }
      .app{ padding:0 !important; }
    }

</style>

<style>
  /* 🏅 Rank label: ซ่อนชื่อไว้ก่อน → แตะที่ไอคอนถึงจะแสดง */
  .rank-line{ margin-top:4px; display:flex; align-items:center; gap:6px; }
  .rank-badge-btn{ width:40px; height:auto; display:block; cursor:pointer; }
  .rank-text{ display:none; }
  .rank-text.show{ display:inline; }
</style>
</head>
<body class="theme-2">
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <img src="/logo.png" alt="CWF">
        <div class="title">
          <b>🔎 ติดตามสถานะงาน (ลูกค้า)</b>
          <span class="muted">ใส่เลข Booking หรือ token</span>
        </div>
      </div>
      <button class="secondary" style="width:auto;min-height:40px;padding:10px 12px;" type="button"
        onclick="location.href='/customer.html'">📅 ไปหน้าจองคิว</button>
    </div>

    <div class="card">
      <div class="grid2">
        <input id="q" placeholder="เช่น CWF0000123 หรือ token" />
        <button type="button" onclick="track()">ค้นหา</button>
      </div>
      <div class="muted" style="margin-top:8px;">* แนะนำใช้เลข Booking เพราะค้นหาง่าย</div>
    </div>

    <div class="card" style="margin-top:12px;">
      <h2>📌 ผลการติดตาม</h2>
      <div id="result" class="muted" style="margin-top:10px;">ยังไม่มีข้อมูล</div>
    </div>
  </div>

<script>
const API = window.location.origin;

// ==============================
// 🔒 Helper: escape HTML
// ==============================
function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, (m) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[m]));
}



// 🏅 Premium Rank Set (Lv.1-5)
const PREMIUM_RANK_SET = {
  1: { label: 'Apprentice', icon64: '/assets/ranks/rank_lv1_128.png' },
  2: { label: 'Technician', icon64: '/assets/ranks/rank_lv2_128.png' },
  3: { label: 'Senior Technician', icon64: '/assets/ranks/rank_lv3_128.png' },
  4: { label: 'Team Lead', icon64: '/assets/ranks/rank_lv4_128.png' },
  5: { label: 'Head Supervisor', icon64: '/assets/ranks/rank_lv5_128.png' },
};
function getPremiumRankInfo(level){
  const n = Number(level);
  if (Number.isFinite(n) && PREMIUM_RANK_SET[n]) return { level:n, ...PREMIUM_RANK_SET[n] };
  return { level:1, ...PREMIUM_RANK_SET[1] };
}
function renderRankLine(t){
  const ri = getPremiumRankInfo(t && t.rank_level);
  const txt = `Rank: Lv.${ri.level} ${ri.label}`;
  const id = `rank_txt_${Math.random().toString(36).slice(2)}`;
  return `<div class="muted rank-line">`+
         `<img src="${ri.icon64}" alt="rank" class="rank-badge-btn" data-rank-target="${id}" aria-label="แตะเพื่อดูชื่อแรงค์" tabindex="0" role="button">`+
         `<span id="${id}" class="rank-text"><b>Rank:</b> Lv.${ri.level} ${ri.label}</span>`+
         `</div>`;
}
// ==============================
// 🧾 E-Slip (Customer view)
// - แสดงเฉพาะเมื่อ job_status = 'เสร็จแล้ว'
// - ใช้ข้อมูลเดิมจากระบบ (อ่านจาก /docs/receipt/:job_id)
// - ไม่แก้คำนวณ ไม่เพิ่ม/ลบ field
// ==============================
function isDoneStatus(jobStatus){
  // รองรับข้อความสถานะที่พบในระบบ: 'เสร็จแล้ว' หรือ 'เสร็จสิ้น'
  // ✅ เปลี่ยนเฉพาะเงื่อนไขการแสดงผลเอกสารฝั่งลูกค้า (ไม่แตะสถานะ/logic ฝั่ง backend)
  const s = String(jobStatus || "").trim();
  return (s === "เสร็จแล้ว" || s === "เสร็จสิ้น");
}

// ✅ สร้าง URL ใบเสร็จเดิมให้ปลอดภัย (กัน backend ส่ง localhost / คนละโดเมน)
// - เป้าหมาย: ป้องกัน Error 'Failed to fetch' ในมือถือ/PWA
function buildReceiptUrl(jobData){
  const id = jobData?.job_id;
  const fallback = id ? `${API}/docs/receipt/${encodeURIComponent(id)}` : "";
  const raw = String(jobData?.receipt_url || "").trim();
  if(!raw) return fallback;

  try{
    // new URL จะรองรับทั้ง absolute และ relative
    const u = new URL(raw, API);

    // ถ้า backend ส่งลิงก์ localhost/127.0.0.1 หรือ origin คนละโดเมน
    // ให้ยึด origin ปัจจุบัน เพื่อกัน CORS/ปลายทางเข้าถึงไม่ได้
    const isLocalHost = (u.hostname === "localhost" || u.hostname === "127.0.0.1" || u.hostname === "0.0.0.0");
    const isDifferentOrigin = (u.origin !== API);

    if (isLocalHost || isDifferentOrigin){
      return `${API}${u.pathname}${u.search}`;
    }

    return u.href;
  }catch(e){
    // fallback แบบไม่พัง
    return fallback || raw;
  }
}

// ✅ ดึงรายการ/ยอดรวมจากใบเสร็จเดิม (HTML) แล้วนำมาแสดงเป็น E-Slip รูปแบบใหม่
async function renderCustomerESlip(jobData){
  const mount = document.getElementById("docMount");
  if(!mount) return;

  // ❌ งานยังไม่เสร็จ: ห้ามแสดงเอกสารใด ๆ
  if(!isDoneStatus(jobData?.job_status)){
    mount.innerHTML = "";
    return;
  }

  // ✅ ใช้ใบเสร็จเดิมเป็นแหล่งข้อมูลหลัก (แต่กันลิงก์ผิด เช่น localhost)
  const receiptUrl = buildReceiptUrl(jobData);
  if(!receiptUrl){
    mount.innerHTML = "";
    return;
  }

  mount.innerHTML = `<div class="muted" style="margin-top:10px;">กำลังสร้าง E-Slip...</div>`;

  try{
    const r = await fetch(receiptUrl, { cache: "no-store", credentials: "include" });
    const html = await r.text();
    if(!r.ok) throw new Error("โหลดใบเสร็จเดิมไม่สำเร็จ");

    // ✅ Parse HTML เพื่อดึงตารางรายการ + สรุปยอด (ใช้ข้อมูลเดิม ไม่แตะ backend)
    const doc = new DOMParser().parseFromString(html, "text/html");
    const table = doc.querySelector("table");

    // rows => [[name, qty, unit, total], ...]
    const rows = Array.from(table?.querySelectorAll("tbody tr") || []).map(tr => {
      const tds = Array.from(tr.querySelectorAll("td")).map(td => (td.textContent || "").trim());
      return {
        name: tds[0] || "-",
        qty: tds[1] || "-",
        unit: tds[2] || "-",
        line: tds[3] || "-",
      };
    });

    // สรุปยอด: หา box ที่มีคำว่า 'ยอดสุทธิ'
    const boxes = Array.from(doc.querySelectorAll(".box"));
    const sumBox = boxes.find(b => (b.textContent || "").includes("ยอดสุทธิ")) || null;
    const sumText = (sumBox?.textContent || "").replace(/\s+/g," ").trim();

    // ดึงตัวเลข (ปล่อยให้เป็นข้อความตามเอกสารเดิม เพื่อไม่แตะคำนวณ)
    const subtotal = (sumText.match(/รวมก่อนลด:\s*([0-9,\.]+)/) || [])[1] || "-";
    const discount = (sumText.match(/ส่วนลด:\s*([0-9,\.]+)/) || [])[1] || "-";
    const total = (sumText.match(/ยอดสุทธิ:\s*([0-9,\.]+)/) || [])[1] || "-";

    const booking = jobData.booking_code || "-";
    const printedAt = new Date().toLocaleString("th-TH");

    // ✅ รูปแบบ E-Slip ตามที่กำหนด (ต้องตรง 100%)
    mount.innerHTML = `
      <div class="eslip-wrap">
        <div class="eslip">
          <div class="eslip-head">
            <img class="eslip-logo" src="/logo.png" alt="Coldwindflow Air Services">
            <div class="h1">ใบรับเงินอิเล็กทรอนิกส์ (E-Receipt)</div>
            <div class="h2">Coldwindflow Air Services</div>
          </div>

          <div class="eslip-meta">
            <div class="box"><b>Booking:</b> ${esc(booking)}</div>
            <div class="box"><b>วันที่แสดงผล:</b> ${esc(printedAt)}</div>
          </div>

          <div class="eslip-actions">
            <button type="button" onclick="window.print()">🖨️ พิมพ์</button>
          </div>

          <div style="margin-top:10px;">
            <div><b>ชื่อลูกค้า:</b> ${esc(jobData.customer_name || "-")}</div>
            <div><b>เบอร์โทร:</b> ${esc(jobData.customer_phone || "-")}</div>
            <div><b>ประเภทงาน:</b> ${esc(jobData.job_type || "-")}</div>
            <div><b>นัดหมาย:</b> ${esc(jobData.appointment_datetime ? new Date(jobData.appointment_datetime).toLocaleString("th-TH") : "-")}</div>
            <div><b>ที่อยู่:</b> ${esc(jobData.address_text || "-")}</div>
          </div>

          <table class="eslip-table" aria-label="รายการและราคา">
            <thead>
              <tr>
                <th>รายการ</th>
                <th style="text-align:right;">จำนวน</th>
                <th style="text-align:right;">ราคา/หน่วย</th>
                <th style="text-align:right;">รวม</th>
              </tr>
            </thead>
            <tbody>
              ${(rows.length ? rows : [{name:"-",qty:"-",unit:"-",line:"-"}]).map(it => `
                <tr>
                  <td>${esc(it.name)}</td>
                  <td style="text-align:right;">${esc(it.qty)}</td>
                  <td style="text-align:right;">${esc(it.unit)}</td>
                  <td style="text-align:right;">${esc(it.line)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>

          <div class="eslip-sum">
            <div class="row"><span>รวมก่อนลด</span><b>${esc(subtotal)}</b></div>
            <div class="row"><span>ส่วนลด</span><b>${esc(discount)}</b></div>
            <div class="row total"><span>ยอดสุทธิ</span><span>${esc(total)}</span></div>
          </div>

          <div class="eslip-foot">
            เอกสารนี้ใช้เป็นหลักฐานการรับเงินเท่านั้น<br>
            ไม่สามารถใช้เป็นใบกำกับภาษีได้<br>
            ราคาดังกล่าวไม่รวมภาษีมูลค่าเพิ่ม
          </div>
        </div>
      </div>
    `;
  }catch(e){
    mount.innerHTML = `<div class="muted" style="margin-top:10px;">❌ สร้าง E-Slip ไม่สำเร็จ: ${esc(e.message)}</div>`;
  }
}

function qs(name){
  const u = new URL(location.href);
  return u.searchParams.get(name);
}

function statusBadge(st){
  const s = String(st||"").trim();
  if(s==="รอดำเนินการ") return '<span class="badge wait">⏳ รอดำเนินการ</span>';
  if(s==="กำลังทำ") return '<span class="badge run">🛠️ กำลังทำ</span>';
  if(s==="เสร็จแล้ว") return '<span class="badge ok">✅ เสร็จแล้ว</span>';
  if(s==="ยกเลิก") return '<span class="badge bad">⛔ ยกเลิก</span>';
  return '<span class="badge wait">⏳ รอดำเนินการ</span>';
}

// ✅ สถานะที่ลูกค้าเข้าใจง่าย (อิงจาก timestamps จริง)
function derivedStatus(d){
  const s = String(d.job_status || '').trim();
  if (s === 'ยกเลิก') return 'ยกเลิก';
  if (s === 'เสร็จแล้ว') return 'เสร็จสิ้น';
  if (d.started_at) return 'กำลังทำงาน';
  if (d.checkin_at) return 'ถึงหน้างานแล้ว';
  if (d.travel_started_at) return 'กำลังเดินทาง';
  return 'รอช่างรับงาน';
}

function timelineHTML(d){
  const steps = [
    { k: 'accepted', label: 'รับงาน / เตรียมเข้าพื้นที่', ok: !!d.technician },
    { k: 'travel', label: 'กำลังเดินทาง', ok: !!d.travel_started_at },
    { k: 'checkin', label: 'ถึงหน้างาน (เช็คอิน)', ok: !!d.checkin_at },
    { k: 'start', label: 'เริ่มทำงาน', ok: !!d.started_at },
    { k: 'done', label: 'เสร็จสิ้น', ok: String(d.job_status||'').trim()==='เสร็จแล้ว' },
  ];
  return `
    <div class="card tight" style="margin-top:10px;">
      <b>📍 ไทม์ไลน์สถานะ</b>
      <div class="muted" style="margin-top:6px;">สถานะปัจจุบัน: <b>${derivedStatus(d)}</b></div>
      <ul style="margin:10px 0 0 18px;">
        ${steps.map(s => `<li style="margin:6px 0;">${s.ok ? '✅' : '⏳'} ${s.label}</li>`).join('')}
      </ul>
    </div>
  `;
}

function photosHTML(d){
  if (!Array.isArray(d.photos) || !d.photos.length) return '';
  return `
    <div class="card tight" style="margin-top:10px;">
      <b>📷 รูปหน้างาน (แสดงหลังเสร็จสิ้นเท่านั้น)</b>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;">
        ${d.photos.map(p=>`
          <a href="${p.public_url}" target="_blank" rel="noopener" style="display:block;">
            <img src="${p.public_url}" alt="${p.phase}" style="width:100%;height:110px;object-fit:cover;border-radius:12px;border:1px solid rgba(0,0,0,.08);" />
          </a>
        `).join('')}
      </div>
    </div>
  `;
}

function reviewHTML(d){
  const done = String(d.job_status||'').trim()==='เสร็จแล้ว';
  if (!done) return '';
  if (d.review && d.review.already_reviewed) {
    return `
      <div class="card tight" style="margin-top:10px;">
        <b>⭐ รีวิวของคุณ</b>
        <div style="margin-top:6px;">ให้คะแนน: <b>${d.review.rating || '-'}</b> / 5</div>
        ${d.review.review_text ? `<div class="muted" style="margin-top:6px;">"${String(d.review.review_text).replace(/</g,'&lt;')}"</div>` : ''}
      </div>
    `;
  }
  return `
    <div class="card tight" style="margin-top:10px;border-style:dashed;">
      <b>⭐ ให้คะแนนช่าง</b>
      <div class="muted" style="margin-top:6px;">รีวิวได้ 1 ครั้ง หลังงานเสร็จสิ้น</div>
      <div class="grid2" style="margin-top:8px;">
        <select id="rate">
          <option value="5">5 - ดีมาก</option>
          <option value="4">4 - ดี</option>
          <option value="3">3 - พอใช้</option>
          <option value="2">2 - ควรปรับปรุง</option>
          <option value="1">1 - แย่</option>
        </select>
        <button type="button" onclick="submitReview('${d.booking_token || d.booking_code || ''}')">ส่งรีวิว</button>
      </div>
      <textarea id="review_text" rows="3" style="margin-top:8px;" placeholder="เขียนรีวิว (ถ้ามี)"></textarea>
      <textarea id="complaint_text" rows="2" style="margin-top:8px;" placeholder="ร้องเรียน/ข้อเสนอแนะ (ถ้ามี)"></textarea>
      <div id="review_status" class="muted" style="margin-top:6px;"></div>
    </div>
  `;
}

// ✅ ส่งรีวิว (หลังงานเสร็จเท่านั้น)
async function submitReview(key){
  const status = document.getElementById('review_status');
  if (status) status.textContent = 'กำลังส่งรีวิว...';
  try{
    const rate = Number(document.getElementById('rate')?.value || 5);
    const review_text = document.getElementById('review_text')?.value || '';
    const complaint_text = document.getElementById('complaint_text')?.value || '';
    const res = await fetch(`${API}/public/review`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ q:key, rating: rate, review_text, complaint_text })
    });
    const data = await res.json().catch(()=>({}));
    if (!res.ok) throw new Error(data.error || 'ส่งรีวิวไม่สำเร็จ');
    if (status) status.textContent = '✅ ส่งรีวิวเรียบร้อย ขอบคุณครับ';
    // refresh
    setTimeout(()=>track(), 600);
  }catch(e){
    if (status) status.textContent = `❌ ${e.message}`;
  }
}

function openNav(lat,lng,addr){
  let url="";
  const has = lat!==null && lng!==null && lat!==undefined && lng!==undefined && !Number.isNaN(Number(lat)) && !Number.isNaN(Number(lng));
  if(has){
    url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(lat + "," + lng)}&travelmode=driving`;
  }else{
    const q=(addr||"").toString().trim();
    if(!q) return alert("ไม่มีพิกัด/ที่อยู่สำหรับนำทาง");
    url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
  }
  window.open(url,"_blank");
}

async function track(){
  const qEl = document.getElementById("q");
  const q = (qEl.value || "").trim();
  if(!q) return alert("ใส่เลข Booking หรือ token");

  const box = document.getElementById("result");
  box.textContent = "กำลังค้นหา...";

  try{
    const res = await fetch(`${API}/public/track?q=${encodeURIComponent(q)}`);
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || "ค้นหาไม่สำเร็จ");

    const dt = data.appointment_datetime ? new Date(data.appointment_datetime).toLocaleString("th-TH") : "-";
    const techTeam = Array.isArray(data.technician_team)
      ? data.technician_team

        ${timelineHTML(data)}

        <hr style="margin:10px 0;">

        <div>
          <b>👨‍🔧 ช่างทั้งหมดในงาน</b>
          ${techTeam && techTeam.length ? `
            <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;">
              ${techTeam.map(t => {
                const name = t.full_name || t.username || "-";
                const photo = t.photo || "/logo.png";

                        ${phone ? `☎️ <a href="${telLink}">${esc(phone)}</a>` : `☎️ ยังไม่มีเบอร์โทร`}
                      </div>

          ` : `<div class="muted" style="margin-top:6px;">ยังไม่มีช่างรับงาน (รอแอดมินมอบหมาย/รอช่างกดรับ)</div>`}
        </div>

        ${data.technician_note ? `
          <div class="card tight" style="margin-top:10px;">
            <b>📝 หมายเหตุจากช่าง (แสดงหลังเสร็จสิ้น)</b>
            <div class="muted" style="margin-top:6px;white-space:pre-wrap;">${String(data.technician_note).replace(/</g,'&lt;')}</div>
          </div>

        ${photosHTML(data)}

        <!-- ✅ E-Slip แสดงเฉพาะเมื่อสถานะงาน = 'เสร็จสิ้น' (job_status = 'เสร็จแล้ว') -->
        <div id="docMount"></div>

        <div class="muted" style="margin-top:10px;">* ถ้าต้องการช่วยเหลือ โทร 098-877-7321 หรือ LINE OA: @cwfair</div>
      </div>
    `;

    // ✅ สร้าง/แสดง E-Slip ตามเงื่อนไข (ห้ามแสดงก่อนเสร็จ)
    try{ await renderCustomerESlip(data); }catch(e){}
  }catch(e){
    box.innerHTML = `<div class="muted">❌ ${e.message}</div>`;

// 🏅 แตะที่ไอคอนแรงค์เพื่อแสดงชื่อแรงค์ (ซ่อนอัตโนมัติ)
(function bindRankBadgeToggle(){
  let hideTimer = null;

  function toggle(targetId){
    const el = targetId ? document.getElementById(targetId) : null;
    if (!el) return;
    const isShown = el.classList.contains('show');
    // ซ่อนตัวอื่น ๆ ที่อาจโชว์อยู่
    try{ document.querySelectorAll('.rank-text.show').forEach(x=>x.classList.remove('show')); }catch(e){}

    if (isShown) {
      el.classList.remove('show');
      if (hideTimer) clearTimeout(hideTimer);
      return;
    }

    el.classList.add('show');
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      try{ el.classList.remove('show'); }catch(e){}
    }, 2500);
  }

  document.addEventListener('click', (e) => {
    const btn = e.target && e.target.closest ? e.target.closest('.rank-badge-btn') : null;
    if (!btn) return;
    toggle(btn.getAttribute('data-rank-target'));
  });

  document.addEventListener('keydown', (e) => {
    const btn = e.target && e.target.closest ? e.target.closest('.rank-badge-btn') : null;
    if (!btn) return;
    const k = e.key;
    if (k !== 'Enter' && k !== ' ') return;
    e.preventDefault();
    toggle(btn.getAttribute('data-rank-target'));
  });
})();

// auto load from query string
const q0 = qs("q") || qs("token") || "";
if(q0){
  document.getElementById("q").value = q0;
  track();
}

// PWA update toast
function showSwToast(onUpdate){
  const wrap = document.getElementById('sw_toast');
  if(!wrap) return;
  wrap.classList.add('show');
  const btn = document.getElementById('sw_toast_reload');
  const close = document.getElementById('sw_toast_close');
  if(btn){ btn.onclick = ()=>{ try{ onUpdate(); }catch(e){} }; }
  if(close){ close.onclick = ()=> wrap.classList.remove('show'); }
}

// PWA: register service worker (HTTPS only)
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js').then((reg)=>{
      function promptUpdate(worker){
        if(!worker) return;
        showSwToast(()=>{
          try{ worker.postMessage({type:'SKIP_WAITING'}); }catch(e){}
          setTimeout(()=>location.reload(), 400);
        });
      }
      if(reg.waiting){
        promptUpdate(reg.waiting);
      }
      reg.addEventListener('updatefound', ()=>{
        const nw = reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange', ()=>{
          if(nw.state === 'installed' && navigator.serviceWorker.controller){
            promptUpdate(nw);
          }
        });
      });
    }).catch(()=>{});
  });
}
</script>

<div id="sw_toast" class="sw-toast" aria-live="polite">
  <div class="sw-toast-card">
    <div class="sw-toast-text">
      <strong>มีอัปเดตใหม่</strong>
      <span>กดรีเฟรชเพื่อใช้งานเวอร์ชันล่าสุด</span>
    </div>
    <div class="sw-toast-actions">
      <button id="sw_toast_reload" class="sw-toast-btn primary" type="button">รีเฟรช</button>
      <button id="sw_toast_close" class="sw-toast-btn ghost" type="button">ปิด</button>
    </div>
  </div>
</div>
