<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CWF Partner Academy</title>
<style>
:root{--navy:#071b49;--blue:#0b56d8;--yellow:#ffd233;--ink:#10203b;--muted:#64748b;--line:#dbe7ff;--bg:#f5f8fd;--ok:#166534;--bad:#b91c1c}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans Thai",sans-serif;background:linear-gradient(180deg,var(--navy),#0d56c9 260px,var(--bg) 260px);color:var(--ink)}.wrap{max-width:900px;margin:0 auto;padding:26px 14px 80px}.hero{color:#fff;padding:10px 0 18px}.back{color:#fff;text-decoration:none;font-weight:900;display:inline-flex;margin-bottom:16px}.hero h1{font-size:32px;line-height:1.15;margin:0}.hero p{margin:8px 0 0;color:rgba(255,255,255,.86);font-weight:800;line-height:1.55}.panel{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 18px 44px rgba(7,27,73,.12);padding:18px;margin-bottom:16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.top h2{margin:0;font-size:26px;color:var(--navy)}.muted{color:var(--muted);font-weight:800}.badge{display:inline-flex;border-radius:999px;padding:7px 11px;font-weight:1000;font-size:12px;background:#e2e8f0}.ok{background:#dcfce7;color:#166534}.bad{background:#fee2e2;color:#991b1b}.warn{background:#fff0c2;color:#8a4d00}.progress{height:12px;background:#e9effb;border-radius:999px;overflow:hidden;margin:12px 0}.bar{height:100%;background:linear-gradient(90deg,#0b56d8,#ffd233);width:0}.lesson{border:1px solid var(--line);border-radius:22px;background:#fff;padding:16px;margin-top:14px}.lesson h3{margin:0;font-size:20px}.lesson p{line-height:1.65;font-weight:800;color:#344966}.video{background:linear-gradient(135deg,#071b49,#0b56d8);color:#fff;border-radius:20px;padding:16px;margin:12px 0}.video b{font-size:18px}.video .timer{display:inline-flex;margin-top:10px;background:rgba(255,255,255,.14);border-radius:999px;padding:8px 12px;font-weight:1000}.btn{border:0;border-radius:16px;padding:13px 16px;font-weight:1000;text-decoration:none;display:inline-flex;justify-content:center;cursor:pointer}.primary{background:var(--yellow);color:var(--navy)}.secondary{background:var(--blue);color:#fff}.ghost{background:#edf3ff;color:var(--navy)}button:disabled{opacity:.55;cursor:not-allowed}.actions{display:flex;gap:10px;flex-wrap:wrap}.exam-card{border:1px solid var(--line);border-radius:20px;padding:15px;margin-top:12px;background:#fbfdff}.choice{display:flex;gap:9px;align-items:flex-start;font-weight:900;margin:9px 0}.choice input{margin-top:4px}.msg{font-weight:900;margin-top:10px}.err{color:var(--bad)}.success{color:var(--ok)}.hidden{display:none}@media(max-width:640px){.hero h1{font-size:28px}.panel{padding:15px;border-radius:24px}.top{display:block}.actions{display:grid}.btn{width:100%}}</style></head>
<body><main class="wrap"><section class="hero"><a href="/tech.html" class="back">‹ กลับหน้าแอพช่าง</a><h1>CWF Partner Academy</h1><p>ดูบทเรียนให้ครบก่อนทำข้อสอบ Basic Partner</p></section><section class="panel hidden" id="academyPanel"><div class="top"><div><h2 id="courseTitle">Basic Partner Course</h2><div class="muted" id="applicantName"></div></div><span class="badge" id="progressBadge">0%</span></div><div class="progress"><div class="bar" id="progressBar"></div></div><div id="lessons"></div></section><section class="panel hidden" id="examPanel"><div class="top"><div><h2 id="examTitle">ข้อสอบ Basic Partner</h2><div class="muted">ต้องผ่านอย่างน้อย 80% และแอดมินต้องอนุมัติอีกครั้งก่อนรับงานจริง</div></div></div><div id="questions"></div><div class="actions" style="margin-top:14px"><button class="btn primary" id="btnSubmitExam" type="button">ส่งข้อสอบ</button><a class="btn ghost" href="/tech.html">กลับหน้าแอพช่าง</a></div></section><div class="msg" id="message"></div></main><script src="/partner-academy.js?v=video-exam-final"></script></body></html>
