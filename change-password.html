<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เปลี่ยนรหัสผ่าน - CWF</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <img src="/logo.png" alt="CWF">
        <div class="title">
          <b>🔑 เปลี่ยนรหัสผ่าน</b>
          <span class="muted">เพื่อความปลอดภัย ต้องใส่รหัสเดิม และยืนยันรหัสใหม่ 2 ครั้ง</span>
        </div>
      </div>
      <button class="secondary" style="width:auto;min-height:40px;padding:10px 12px;" type="button" onclick="history.back()">ย้อนกลับ</button>
    </div>

    <div class="card">
      <h2>ข้อมูลผู้ใช้</h2>
      <div class="muted" id="who">กำลังโหลด...</div>
    </div>

    <div class="card">
      <h2>กรอกรหัสผ่าน</h2>

      <label>รหัสเดิม</label>
      <input id="old_password" type="password" placeholder="รหัสเดิม">

      <label style="margin-top:10px;">รหัสใหม่</label>
      <input id="new_password" type="password" placeholder="รหัสใหม่">

      <label style="margin-top:10px;">ยืนยันรหัสใหม่</label>
      <input id="confirm_password" type="password" placeholder="พิมพ์รหัสใหม่อีกครั้ง">

      <div class="row" style="margin-top:12px;">
        <button type="button" onclick="submitChange()">✅ เปลี่ยนรหัสผ่าน</button>
        <button class="secondary" type="button" onclick="resetForm()">ล้างฟอร์ม</button>
      </div>

      <div id="msg" style="margin-top:10px;"></div>
    </div>
  </div>

<script>
const API = window.location.origin;
const username = localStorage.getItem("username");
const role = localStorage.getItem("role");
if(!username || !role){ location.href = "/login.html"; }

function esc(s){ return String(s||"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }

document.getElementById("who").innerHTML = `ผู้ใช้: <b>${esc(username)}</b> <span class="muted">(${esc(role)})</span>`;

function resetForm(){
  document.getElementById("old_password").value = "";
  document.getElementById("new_password").value = "";
  document.getElementById("confirm_password").value = "";
  document.getElementById("msg").innerHTML = "";
}

async function submitChange(){
  const old_password = (document.getElementById("old_password").value || "");
  const new_password = (document.getElementById("new_password").value || "");
  const confirm_password = (document.getElementById("confirm_password").value || "");
  const msg = document.getElementById("msg");
  msg.innerHTML = "";

  if(!old_password) return msg.innerHTML = "<div style='color:#b91c1c;font-weight:800;'>❌ ต้องใส่รหัสเดิม</div>";
  if(!new_password) return msg.innerHTML = "<div style='color:#b91c1c;font-weight:800;'>❌ ต้องใส่รหัสใหม่</div>";
  if(new_password !== confirm_password) return msg.innerHTML = "<div style='color:#b91c1c;font-weight:800;'>❌ ยืนยันรหัสใหม่ไม่ตรงกัน</div>";

  try{
    const res = await fetch(`${API}/auth/change-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, old_password, new_password, confirm_password })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || "เปลี่ยนรหัสผ่านไม่สำเร็จ");
    msg.innerHTML = "<div class='muted'>✅ เปลี่ยนรหัสผ่านเรียบร้อย</div>";
    resetForm();
  }catch(e){
    msg.innerHTML = `<div style='color:#b91c1c;font-weight:800;'>❌ ${esc(e.message)}</div>`;
  }
}
</script>
</body>
</html>
