<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- Never send a Referer header. Placed before every resource tag so a legacy
       q=credential deep link cannot leak the credential as the Referer of a
       same-origin CSS / JS / icon / font request. -->
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#071B38">
  <meta name="application-name" content="CWF Service">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CWF Service">
  <title>CWF Customer Service</title>
  <!-- Load one web font (Noto Sans Thai) so every screen renders in the same
       typeface regardless of what the device has installed. Loaded async
       (media=print → all onload) so a slow/unreachable font CDN never blocks
       first paint; the UI shows the fallback stack until the font arrives. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800;900&display=swap"></noscript>
  <link rel="manifest" href="./manifest.webmanifest?v=20260717_customer_history_line_hotfix_v1">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/cwf-customer-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/cwf-customer-180.png">
  <link rel="stylesheet" href="./assets/customer-app.css?v=20260717_customer_history_line_hotfix_v1">
</head>
<body class="is-app-booting">
  <div class="app-shell" data-app-shell>
    <header class="app-header">
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true">
          <img src="./assets/icons/cwf-customer-192.png" alt="">
          <span>CWF</span>
        </div>
        <div>
          <p class="eyebrow">Coldwindflow</p>
          <h1>CWF Service</h1>
        </div>
      </div>
      <button class="icon-pill" type="button" data-route="profile" data-account-chip aria-label="เข้าสู่ระบบหรือดูบัญชี">
        <span class="account-chip-avatar" data-account-chip-avatar aria-hidden="true"></span>
        <span data-account-chip-label>บัญชี</span>
      </button>
    </header>

    <main id="app" class="app-main" tabindex="-1">
      <section class="app-boot-screen" aria-live="polite">
        <img src="./assets/icons/cwf-customer-192.png" alt="" width="72" height="72">
        <strong>กำลังเปิด CWF Service</strong>
        <span>เตรียมบริการและข้อมูลบัญชีของคุณ</span>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="เมนูแอปลูกค้า">
      <button type="button" data-route="home" class="nav-item is-active"><span class="nav-item-icon" data-nav-icon aria-hidden="true"></span><span data-nav-label>หน้าแรก</span></button>
      <button type="button" data-route="store" class="nav-item"><span class="nav-item-icon" data-nav-icon aria-hidden="true"></span><span data-nav-label>ร้านค้า</span></button>
      <button type="button" data-route="booking" class="nav-item nav-item-primary"><span class="nav-item-icon" data-nav-icon aria-hidden="true"></span><span data-nav-label>จองบริการ</span></button>
      <button type="button" data-route="tracking" class="nav-item"><span class="nav-item-icon" data-nav-icon aria-hidden="true"></span><span data-nav-label>ติดตามงาน</span></button>
      <button type="button" data-route="profile" class="nav-item"><span class="nav-item-icon" data-nav-icon aria-hidden="true"></span><span data-nav-label>บัญชี</span></button>
    </nav>
  </div>

  <script src="./modules/iconRegistry.js?v=20260717_customer_history_line_hotfix_v1"></script>

  <script src="./assets/customer-app.js?v=20260717_customer_history_line_hotfix_v1"></script>
</body>
