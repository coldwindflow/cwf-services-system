<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>อัปโหลดเอกสารพาร์ทเนอร์ CWF</title>
<style>
:root{--navy:#071b49;--blue:#0b4bb3;--yellow:#ffd233;--ink:#0f172a;--muted:#64748b;--line:#dbe7ff;--bg:#f5f8fd;--ok:#166534;--warn:#92400e;--bad:#991b1b}*{box-sizing:border-box}body{margin:0;font-family:Arial,'Noto Sans Thai',sans-serif;background:linear-gradient(180deg,var(--navy),var(--blue) 245px,var(--bg) 245px);color:var(--ink)}.wrap{max-width:860px;margin:0 auto;padding:24px 14px 70px}.hero{color:#fff;margin:6px 0 18px}.hero h1{margin:0;font-size:30px}.hero p{margin:8px 0 0;color:rgba(255,255,255,.86);font-weight:800;line-height:1.55}.panel{background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:0 16px 36px rgba(7,27,73,.10);padding:18px;margin-bottom:14px}.profile h2{margin:0;font-size:24px;color:var(--navy)}.muted{color:var(--muted);font-weight:800}.badge{display:inline-flex;border-radius:999px;padding:6px 10px;font-weight:1000;font-size:12px;background:#e2e8f0}.ok{background:#dcfce7;color:var(--ok)}.warn{background:#fef3c7;color:var(--warn)}.bad{background:#fee2e2;color:var(--bad)}.doc{display:grid;grid-template-columns:54px 1fr;gap:13px;border:1px solid var(--line);border-radius:22px;background:#fff;padding:16px;margin:12px 0;box-shadow:0 10px 24px rgba(7,27,73,.05)}.icon{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;background:#eef4ff;font-size:26px}.doc h3{margin:0;color:var(--navy);font-size:20px}.tips{margin:8px 0;color:var(--muted);font-weight:800;line-height:1.55}.upload{margin-top:10px;display:grid;gap:10px}.upload input{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;background:#f8fbff;font-weight:800}button{border:0;border-radius:16px;padding:13px 16px;background:var(--blue);color:#fff;font-weight:1000;font-size:16px;cursor:pointer}.note{background:#eef7ff;border:1px solid #cce5ff;border-radius:20px;padding:14px;color:#24466d;font-weight:850;line-height:1.6}.hidden{display:none}.msg{font-weight:900;margin-top:10px}.msg.err{color:var(--bad)}@media(max-width:640px){.hero h1{font-size:25px}.doc{grid-template-columns:1fr}.icon{width:48px;height:48px}.panel{border-radius:22px}}
</style></head><body><main class="wrap"><section class="hero"><h1>อัปโหลดเอกสาร</h1><p>ส่งเอกสารให้ครบเพื่อใช้ตรวจสอบตัวตนและปลดล็อกขั้นตอนถัดไป</p></section><section class="panel profile" id="profilePanel"><h2 id="appName">กำลังโหลดข้อมูล...</h2><div class="muted" id="appMeta"></div><div id="message" class="msg"></div></section><section class="panel"><div class="note">เอกสารที่อัปโหลดใช้สำหรับตรวจสอบภายใน CWF เท่านั้น รองรับ JPG, PNG, WEBP และ PDF ขนาดไม่เกินที่ระบบกำหนด</div><div id="documentCards"></div></section></main><script src="/partner-status.js?v=real-flow-final"></script></body></html>
