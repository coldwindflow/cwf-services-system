<body>
  <div class="ai-office-page aiApp">
    <header class="ai-office-header topBar">
      <div class="brand-area brand">
        <img class="brandLogo" src="/assets/ai-office-final/brand/logo-mark.png" alt="Coldwindflow">
        <div class="brandText">
          <h1>CWF Admin</h1>
          <p>CWF AI Office</p>
        </div>
      </div>
      <div class="topActions">
        <div class="livePill"><span>อ่านข้อมูลงานจริง</span></div>
        <button class="menu-button iconBtn" type="button" id="btnRefresh" aria-label="โหลดข้อมูลใหม่">↻</button>
      </div>
    </header>

    <section class="ai-office-summary statusStrip" aria-label="สถานะงานจริง">
      <div class="summary-card today metric"><span>งานวันนี้</span><b id="statToday">-</b></div>
      <div class="summary-card tomorrow metric"><span>งานพรุ่งนี้</span><b id="statTomorrow">-</b></div>
      <div class="summary-card open metric"><span>ยังไม่ปิด</span><b id="statOpen">-</b></div>
      <div class="summary-card unpaid metric"><span>ยังไม่จ่าย</span><b id="statUnpaid">-</b></div>
    </section>

    <main class="ai-office-main gameShell office-shell">
      <section class="game-stage-card game-stage-wrap" aria-label="CWF AI command office">
        <div class="game-stage officeMap" id="officeScene">
          <div class="office-map-layer"></div>
          <div class="agent-layer">
            <button class="agent npc selected" type="button" data-agent="admin" aria-label="Admin AI">
              <span class="agent-shadow"></span><span class="agent-ring npcRing"></span><img class="agent-sprite npcSprite" alt=""><span class="agent-label npcName">Admin AI</span><span class="agent-role npcRole">สรุปงานและข้อความ</span><span class="agent-bubble npcBubble">พร้อมช่วยสรุปงานและร่างข้อความ</span>
            </button>
            <button class="agent npc" type="button" data-agent="sales" aria-label="Sales AI">
              <span class="agent-shadow"></span><span class="agent-ring npcRing"></span><img class="agent-sprite npcSprite" alt=""><span class="agent-label npcName">Sales AI</span><span class="agent-role npcRole">ราคาและการปิดงาน</span><span class="agent-bubble npcBubble">พร้อมช่วยปิดการขาย</span>
            </button>
            <button class="agent npc" type="button" data-agent="ops" aria-label="Ops AI">
              <span class="agent-shadow"></span><span class="agent-ring npcRing"></span><img class="agent-sprite npcSprite" alt=""><span class="agent-label npcName">Ops AI</span><span class="agent-role npcRole">คิวงานและความเสี่ยง</span><span class="agent-bubble npcBubble">พร้อมคุมคิวและดูความเสี่ยง</span>
            </button>
            <button class="agent npc" type="button" data-agent="ads" aria-label="Ads AI">
              <span class="agent-shadow"></span><span class="agent-ring npcRing"></span><img class="agent-sprite npcSprite" alt=""><span class="agent-label npcName">Ads AI</span><span class="agent-role npcRole">โฆษณาและพื้นที่บริการ</span><span class="agent-bubble npcBubble">พร้อมคิดแคมเปญ</span>
            </button>
            <button class="agent npc" type="button" data-agent="content" aria-label="Content AI">
              <span class="agent-shadow"></span><span class="agent-ring npcRing"></span><img class="agent-sprite npcSprite" alt=""><span class="agent-label npcName">Content AI</span><span class="agent-role npcRole">โพสต์และสคริปต์</span><span class="agent-bubble npcBubble">พร้อมทำคอนเทนต์</span>
            </button>
            <button class="agent npc" type="button" data-agent="dev" aria-label="Dev AI">
              <span class="agent-shadow"></span><span class="agent-ring npcRing"></span><img class="agent-sprite npcSprite" alt=""><span class="agent-label npcName">Dev AI</span><span class="agent-role npcRole">ระบบและเช็กลิสต์</span><span class="agent-bubble npcBubble">พร้อมตรวจระบบ</span>
            </button>
          </div>
          <div class="fx-layer"></div>
        </div>
      </section>
    </main>
    <section class="ai-work-console ai-console-panel console" id="commandConsole" aria-label="AI command console">
      <button class="console-handle consoleHandle" type="button" id="consoleToggle" aria-label="เปิดหรือย่อแผงคำสั่ง"></button>
      <div class="consoleBody">
        <div class="agentConsole console-agent-header">
          <div class="agent-header selectedLine">
            <div class="agent-avatar avatarDot" id="agentAvatar"></div>
            <div class="agent-title-block selectedText">
              <b class="agent-name" id="agentName">Admin AI</b>
              <span id="agentRole">ผู้ช่วยแอดมินสำหรับสรุปงาน ร่างข้อความลูกค้า ข้อความช่าง และแปลภาษา</span>
              <em class="agent-status agentState" id="agentStatus">พร้อมช่วย</em>
            </div>
          </div>
          <div class="quick-actions-grid quick-actions quickList" id="quickCommands"></div>
        </div>
        <div class="workConsole console-workflow">
          <div class="phone-search-area phoneRow">
            <input class="phone-input input" id="phoneInput" inputmode="tel" autocomplete="off" placeholder="&#x0E40;&#x0E1A;&#x0E2D;&#x0E23;&#x0E4C;&#x0E25;&#x0E39;&#x0E01;&#x0E04;&#x0E49;&#x0E32;">
            <button class="phone-search-button primary" type="button" id="btnPhone">ค้นงาน</button>
          </div>
          <div class="conversation-list conversation-area messages" id="messages"><div class="msg ai">เลือกตัวละครหรือพิมพ์คำถามเพื่อเริ่มงาน</div></div>
          <div class="composer-row input-area composer">
            <textarea class="question-input ask" id="askInput" rows="2" placeholder="&#x0E1E;&#x0E34;&#x0E21;&#x0E1E;&#x0E4C;&#x0E16;&#x0E32;&#x0E21;&#x0E07;&#x0E32;&#x0E19;&#x0E15;&#x0E23;&#x0E07;&#x0E19;&#x0E35;&#x0E49;..."></textarea>
            <button class="ask-button primary" type="button" id="btnAsk">ถาม</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="lock" id="pinOverlay">
    <div class="lockBox">
      <h2>ยืนยันสิทธิ์ AI Office</h2>
      <p>กรอกรหัสสำหรับเข้าใช้งานส่วน AI Office</p>
      <input class="input" id="pinInput" type="password" inputmode="numeric" autocomplete="off" placeholder="รหัสเข้าใช้งาน">
      <div class="lockActions">
        <button class="primary" type="button" id="btnPin">เข้าใช้งาน</button>
        <button class="ghost" type="button" onclick="location.href='/admin-dashboard-v2.html'">กลับหน้าแอดมิน</button>
      </div>
      <div id="pinError" class="error" style="display:none;margin:12px 0 0"></div>
    </div>
  </div>
  <script>console.info("CWF AI Office version ai-office-game-console-20260607");</script>
