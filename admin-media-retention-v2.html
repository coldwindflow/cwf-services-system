<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ตัวจัดการรูปและพื้นที่จัดเก็บ</title>
  <link rel="stylesheet" href="/style.css">
  <style>.media-bulk{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px;padding:10px;border-radius:16px;background:#f8fafc;border:1px solid rgba(15,23,42,.08)}.media-job-row{border-radius:18px}.media-job-row.is-eligible{box-shadow:0 0 0 2px rgba(34,197,94,.10)}</style>
</head>
<body class="cwf-admin-v2-shell">
  <main class="wrap">
    <section class="card">
      <h2>ตัวจัดการรูปและพื้นที่จัดเก็บ</h2>
      <div class="muted2">ตรวจสอบรูปหลักฐานเก่าหลังพ้นระยะประกัน รูปสลิปไม่ถูกลบอัตโนมัติ</div>
    </section>

    <section class="card">
      <div id="mediaSummary" class="summary-grid"></div>
      <div class="row" style="gap:10px;flex-wrap:wrap;align-items:flex-end;margin-top:12px">
        <div style="width:180px">
          <label>ประเภทงาน</label>
          <select id="filterType">
            <option value="all">ทั้งหมด</option>
            <option value="ล้าง">งานล้าง</option>
            <option value="ซ่อม">งานซ่อม</option>
            <option value="ติดตั้ง">งานติดตั้ง</option>
          </select>
        </div>
        <div style="width:190px">
          <label>สถานะ</label>
          <select id="filterStatus">
            <option value="all">ทั้งหมด</option>
            <option value="eligible">ลบได้แล้ว</option>
            <option value="protected">ยังอยู่ในประกัน</option>
          </select>
        </div>
        <div style="flex:1;min-width:220px">
          <label>ค้นหาลูกค้าจากชื่อ/เบอร์</label>
          <input id="filterSearch" placeholder="ชื่อ เบอร์ หรือเลขงาน">
        </div>
        <button id="btnReload" type="button" style="width:auto">ค้นหา</button>
      </div>
      <div class="media-bulk">
        <span id="bulkBar">เลือกแล้ว <b>0</b> ใบงาน</span>
        <button type="button" class="secondary" style="width:auto" onclick="setAllEligible(true)">เลือกงานที่ลบได้ทั้งหมด</button>
        <button type="button" class="secondary" style="width:auto" onclick="setAllEligible(false)">เอาติ๊กถูกออกทั้งหมด</button>
        <button type="button" class="secondary" style="width:auto" onclick="dryRunSelected()">ตรวจสอบรายการที่เลือก</button>
        <button type="button" class="danger" style="width:auto" onclick="purgeSelected(false)">ล้างหลักฐานงานที่เลือก</button>
        <button type="button" class="danger" style="width:auto;background:#7c2d12" onclick="purgeSelected(true)">ลบเฉพาะสลิปที่เลือก</button>
      </div>
    </section>

    <section class="card">
      <div class="muted2" style="margin-bottom:8px">เรียงงานเก่าก่อน เพื่อให้ล้างข้อมูลที่ควรลบก่อน งานที่ไม่มีรูปจะไม่แสดงให้รก</div>
      <div id="mediaJobs" class="list"></div>
    </section>
  </main>
  <script src="/admin-v2-common.js"></script>
  <script src="/admin-media-retention-v2.js?v=media-bulk-v10"></script>
</body>
</html>
