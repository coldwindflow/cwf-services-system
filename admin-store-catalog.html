<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin • รายการบริการในร้านค้า</title>
  <link rel="stylesheet" href="/style.css"/>
  <link rel="stylesheet" href="/admin-store-catalog.css?v=20260622_admin_catalog_phase2a2_v1"/>
</head>
<body>
  <div class="topbar">
    <div><b>🗂️ รายการบริการในร้านค้า (Admin)</b></div>
  </div>

  <div class="container">
    <div class="card asc-toolbar">
      <div class="asc-toolbar-row">
        <div>
          <b>รายการบริการ</b>
          <div class="muted2 mini">บันทึกแล้วมีผลทันทีผ่าน API จริง</div>
        </div>
        <button id="btnNewItem" class="primary" type="button">+ เพิ่มบริการ</button>
      </div>
      <div class="asc-toolbar-row">
        <input id="catalog_search" class="asc-search" placeholder="ค้นหาชื่อรายการ">
        <select id="catalog_filter_active" class="asc-filter">
          <option value="">ทุกสถานะ</option>
          <option value="1">เปิดใช้งาน</option>
          <option value="0">ปิดใช้งาน</option>
        </select>
        <select id="catalog_filter_visible" class="asc-filter">
          <option value="">ทั้งหมด</option>
          <option value="1">แสดงลูกค้า</option>
          <option value="0">ไม่แสดง</option>
        </select>
        <button id="btnReloadCatalog" class="secondary btn-small" type="button">รีเฟรช</button>
      </div>
    </div>

    <div class="card" style="margin-top:12px">
      <b>รายการทั้งหมด</b>
      <div id="catalog_list" class="asc-card-list">กำลังโหลดรายการ...</div>
    </div>

    <div class="card" style="margin-top:12px">
      <b>👀 ดูตัวอย่างร้านค้าลูกค้า (Read-only Preview)</b>
      <div class="muted2 mini" style="margin-top:4px">แสดงเฉพาะรายการที่ "เปิดใช้งาน" และ "แสดงให้ลูกค้าเห็น" พร้อมกัน ตามข้อมูลจริงที่โหลดมาด้านบน</div>
      <div id="catalog_preview" style="margin-top:10px"></div>
    </div>
  </div>

  <script src="/admin-v2-common.js?v=20260622_admin_menu_catalog_entry"></script>
  <script src="/admin-store-catalog.js?v=20260622_admin_catalog_phase2a2_v1"></script>
</body>
</html>
