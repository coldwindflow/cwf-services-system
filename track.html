<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>CWF Customer App</title>
  <script>
    (function () {
      "use strict";
      var params = new URLSearchParams(window.location.search || "");
      var credential = String(params.get("q") || params.get("token") || "").trim();
      var destination = "/customer-app/index.html#tracking";
      if (credential) destination += "?q=" + encodeURIComponent(credential);
      window.location.replace(destination);
    }());
  </script>
</head>
<body>
  <noscript><a href="/customer-app/index.html#tracking">เปิดหน้าติดตามงาน</a></noscript>
</body>
</html>
