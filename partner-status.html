<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สถานะพาร์ทเนอร์ CWF</title>
  <style>
    :root{--navy:#081c4b;--blue:#0b4bb3;--yellow:#ffcc00;--ink:#0f172a;--muted:#64748b;--line:#dbe7ff;--bg:#f6f8fc}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans Thai",sans-serif;background:linear-gradient(180deg,var(--navy),var(--blue) 250px,var(--bg) 250px);color:var(--ink)}
    .wrap{max-width:1000px;margin:0 auto;padding:26px 14px 64px}.hero{color:#fff;margin-bottom:14px}.hero h1{margin:0;font-size:26px}.hero p{margin:6px 0 0;color:rgba(255,255,255,.82);font-weight:800}
    .panel{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 14px 34px rgba(2,6,23,.12);padding:16px;margin-bottom:14px}.row{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    label{display:block;font-size:12px;font-weight:900;color:#334155;margin-bottom:5px}input,select{width:100%;border:1px solid #c9d7f2;border-radius:8px;padding:10px 12px;font:inherit;font-weight:700}button,.btn{border:0;border-radius:8px;padding:10px 13px;font-weight:1000;cursor:pointer;text-decoration:none;display:inline-flex;justify-content:center}.primary{background:var(--yellow);color:var(--navy)}.secondary{background:var(--blue);color:#fff}.ghost{background:#eef4ff;color:var(--navy)}
    .badge{display:inline-flex;border-radius:999px;padding:5px 10px;font-weight:1000;font-size:12px;background:#e2e8f0}.ok{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.bad{background:#fee2e2;color:#991b1b}.muted{color:var(--muted);font-weight:800}.doc,.card{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.hidden{display:none}
    @media(max-width:760px){.row,.grid{grid-template-columns:1fr}.hero h1{font-size:22px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero"><h1>สถานะ Partner Onboarding</h1><p>อัปโหลดเอกสาร ตรวจสถานะ และไปขั้นตอนถัดไป</p></section>
    <section class="panel">
      <div class="row"><div><label>รหัสอ้างอิงใบสมัคร</label><input id="applicationCode"></div><div><label>เบอร์โทร</label><input id="phone" inputmode="tel"></div><button class="secondary" id="btnLoad" type="button">โหลดสถานะ</button></div>
      <div class="muted" id="message" style="margin-top:10px"></div>
    </section>
    <section class="panel hidden" id="statusPanel">
      <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><h2 id="appName" style="margin:0">-</h2><div class="muted" id="appMeta">-</div></div><span class="badge" id="appStatus">-</span></div>
      <div class="grid" id="stageGrid" style="margin-top:12px"></div>
      <div class="actions"><a class="btn secondary" id="agreementLink">เซ็นสัญญา</a><a class="btn primary" id="academyLink">เข้า Academy</a><a class="btn ghost" href="/login.html">กลับเข้าแอพช่าง</a></div>
    </section>
    <section class="panel hidden" id="docsPanel"><h2>เอกสาร Verify</h2><div class="grid" id="documentCards"></div></section>
  </main>
  <script src="/partner-status.js"></script>
</body>
</html>
