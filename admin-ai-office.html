<!DOCTYPE html>
<html lang="th">
<head>
  <link rel="apple-touch-icon" href="/icon-cwf-v32-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#06163d">
  <link rel="manifest" href="/manifest.json">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="cwf-ai-office-version" content="ai-office-fullscreen-chat-v4-brain-20260607" />
  <title>CWF AI Office</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    :root{
      --navy:#06163d;--navy2:#0b2e72;--blue:#1558d6;--blue2:#0d3d8d;--gold:#ffcc00;
      --ink:#07152f;--muted:#66748d;--line:rgba(15,23,42,.13);--card:#fff;
      --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
      --safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px)

    *{box-sizing:border-box}html,body{width:100%;min-height:100%;margin:0;overflow-x:hidden}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:#06163d}#cwfTopNav,#cwfTopNavSpacer,#cwfNavSpacer{display:none!important}button,input,textarea{font:inherit}button{touch-action:manipulation}.sr{position:absolute!important;width:1px;height:1px;overflow:hidden;clip:rect(1px,1px,1px,1px)}
    .page{min-height:100vh;min-height:100dvh;background:linear-gradient(180deg,#06163d 0,#0b2e72 34%,#eaf3ff 34%,#f7fbff 100%);display:flex;flex-direction:column;overflow:hidden}
    .topbar{padding:calc(14px + var(--safe-top)) max(16px,var(--safe-right)) 14px max(16px,var(--safe-left));display:flex;align-items:center;justify-content:space-between;gap:12px;color:#fff;background:linear-gradient(135deg,#06163d 0,#0d3d8d 72%,#1769ff 100%);box-shadow:0 14px 34px rgba(3,12,35,.32);z-index:8}.brand{display:flex;align-items:center;gap:13px;min-width:0}.brand img{width:52px;height:52px;object-fit:contain;border-radius:18px;background:#fff;padding:6px;box-shadow:0 12px 24px rgba(0,0,0,.22)}.brand h1{margin:0;font-size:25px;line-height:1;font-weight:1000;letter-spacing:.1px}.brand p{margin:5px 0 0;color:rgba(255,255,255,.78);font-size:12px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:68vw}.reload{appearance:none;border:0;width:52px;height:52px;border-radius:18px;background:#fff;color:#0d3d8d;font-size:22px;font-weight:1000;box-shadow:0 12px 26px rgba(0,0,0,.18);cursor:pointer}.reload:active{transform:translateY(1px)}
    .stats{display:flex;gap:10px;padding:14px max(14px,var(--safe-right)) 12px max(14px,var(--safe-left));background:rgba(6,22,61,.96);overflow-x:auto;scrollbar-width:none}.stats::-webkit-scrollbar{display:none}.stat{flex:1 0 136px;min-width:136px;border-radius:22px;padding:14px 16px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.13);color:#fff;box-shadow:0 12px 24px rgba(0,0,0,.12)}.stat span{display:block;color:rgba(255,255,255,.72);font-size:12px;font-weight:850}.stat b{display:block;margin-top:6px;font-size:25px;line-height:1;font-weight:1000}
    .office{flex:1;min-height:0;padding:14px max(14px,var(--safe-right)) calc(18px + var(--safe-bottom)) max(14px,var(--safe-left));background:linear-gradient(180deg,#e7f0ff 0,#f7fbff 100%);display:flex;flex-direction:column;gap:12px}.stage{position:relative;border-radius:30px;overflow:hidden;border:3px solid rgba(255,255,255,.98);box-shadow:0 24px 62px rgba(7,21,47,.25);background:#eaf4ff;isolation:isolate;min-height:360px}.map{position:absolute;inset:0;z-index:0;background:url("/assets/ai-office-final/maps-clean/office-main-desktop.png") center/cover no-repeat,linear-gradient(135deg,#eaf4ff,#fff)}.stage:before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(6,22,61,.12) 76%,rgba(6,22,61,.22))}.hint{position:absolute;left:50%;top:12px;transform:translateX(-50%);z-index:4;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.94);border:2px solid rgba(255,204,0,.82);box-shadow:0 12px 26px rgba(7,21,47,.18);color:#0d3d8d;font-size:13px;font-weight:1000;white-space:nowrap}.agents{position:absolute;inset:0;z-index:5;pointer-events:none}.agent{position:absolute;left:var(--x);top:var(--y);width:var(--agent-size,62px);min-width:58px;min-height:82px;padding:0;border:0;background:transparent;transform:translate(-50%,-100%);cursor:pointer;pointer-events:auto;z-index:calc(20 + var(--depth,50));transition:left .72s cubic-bezier(.22,.9,.22,1),top .72s cubic-bezier(.22,.9,.22,1),filter .16s ease}.agent:after{content:"";position:absolute;left:50%;bottom:-18px;transform:translateX(-50%);width:calc(100% + 32px);height:calc(100% + 34px);border-radius:24px;z-index:9}.agent:focus-visible{outline:3px solid var(--gold);outline-offset:10px;border-radius:20px}.agent.selected{filter:drop-shadow(0 0 18px rgba(255,204,0,.45))}.agent-shadow{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:70%;height:13px;border-radius:999px;background:rgba(0,0,0,.24);filter:blur(4px);z-index:0}.agent-ring{position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);width:86%;height:18px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,204,0,.62),rgba(21,88,214,.36) 46%,transparent 74%);box-shadow:0 0 18px rgba(255,204,0,.42);opacity:0;z-index:1;pointer-events:none}.agent.selected .agent-ring{opacity:1}.sprite{display:block;position:relative;z-index:3;width:100%;height:auto;object-fit:contain;filter:drop-shadow(0 12px 12px rgba(7,21,47,.26));animation:idle 3.2s ease-in-out infinite}.label{position:absolute;left:50%;bottom:-31px;transform:translateX(-50%);z-index:7;max-width:112px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:6px 11px;border-radius:999px;background:#0d3d8d;color:#fff;border:2px solid rgba(255,255,255,.92);box-shadow:0 10px 18px rgba(7,21,47,.24);font-size:11px;font-weight:1000;line-height:1}.bubble{position:absolute;left:50%;bottom:calc(100% + 10px);transform:translateX(-50%) translateY(5px);z-index:12;max-width:min(200px,44vw);padding:9px 11px;border-radius:15px;background:rgba(255,255,255,.97);color:#10223f;border:1px solid rgba(15,23,42,.14);box-shadow:0 12px 24px rgba(0,0,0,.23);font-size:12px;line-height:1.38;font-weight:850;opacity:0;visibility:hidden;pointer-events:none}.bubble:after{content:"";position:absolute;left:50%;bottom:-8px;transform:translateX(-50%);border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid rgba(255,255,255,.97)}.agent.has-bubble .bubble{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}.agent.walking .sprite{animation:walk .34s ease-in-out infinite}.agent.thinking .sprite{animation:think 1.05s ease-in-out infinite}.agent.talking .sprite{animation:talk .8s ease-in-out infinite}
    .rolebar{display:flex;align-items:center;gap:10px;overflow-x:auto;scrollbar-width:none;padding:2px 2px 4px}.rolebar::-webkit-scrollbar{display:none}.rolechip{appearance:none;border:1px solid rgba(21,88,214,.13);background:#fff;color:#0d3d8d;min-height:46px;border-radius:999px;padding:6px 14px 6px 7px;display:inline-flex;align-items:center;gap:8px;box-shadow:0 10px 20px rgba(7,21,47,.08);font-weight:1000;white-space:nowrap;cursor:pointer}.rolechip img{width:32px;height:32px;object-fit:contain;border-radius:999px;background:#edf5ff}.rolechip.active{background:linear-gradient(135deg,#0d3d8d,#1769ff);color:#fff;border-color:rgba(255,255,255,.18)}
    .chat{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;background:#f7fbff;color:var(--ink)}.chat.open{display:flex}.chatTop{flex:0 0 auto;padding:calc(10px + var(--safe-top)) max(12px,var(--safe-right)) 10px max(12px,var(--safe-left));background:linear-gradient(135deg,#06163d,#0d3d8d 72%,#1769ff);color:#fff;box-shadow:0 12px 30px rgba(3,12,35,.28)}.chatHead{display:flex;align-items:center;gap:12px}.back{appearance:none;border:0;width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.14);color:#fff;font-size:24px;font-weight:1000;cursor:pointer}.chatAvatar{width:48px;height:48px;object-fit:contain;border-radius:16px;background:#fff;padding:4px}.chatTitle{min-width:0;flex:1}.chatTitle b{display:block;font-size:20px;line-height:1.05;font-weight:1000}.chatTitle span{display:block;margin-top:4px;max-width:100%;font-size:12px;line-height:1.35;color:rgba(255,255,255,.78);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.switchers{display:flex;gap:7px;overflow-x:auto;margin-top:10px;scrollbar-width:none}.switchers::-webkit-scrollbar{display:none}.switch{appearance:none;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.12);color:#fff;border-radius:999px;min-height:34px;padding:5px 11px;font-weight:950;white-space:nowrap}.switch.active{background:#fff;color:#0d3d8d}.chatBody{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px max(12px,var(--safe-right)) 18px max(12px,var(--safe-left));display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg,#f7fbff,#edf5ff)}.message{max-width:min(760px,92vw);border-radius:20px;padding:13px 15px;line-height:1.58;font-size:15px;white-space:pre-wrap;overflow-wrap:anywhere;box-shadow:0 10px 22px rgba(7,21,47,.08)}.message.ai{align-self:flex-start;background:#fff;border:1px solid rgba(21,88,214,.12);color:#10223f}.message.user{align-self:flex-end;background:linear-gradient(135deg,#0d3d8d,#1769ff);color:#fff}.message.error{align-self:flex-start;background:#fff8da;border:1px solid #f2d96a;color:#5f4b00}.copyWrap{display:flex;justify-content:flex-start;margin-top:-6px}.copyBtn{appearance:none;border:1px solid rgba(21,88,214,.12);background:#fff;color:#0d3d8d;border-radius:999px;min-height:34px;padding:0 12px;font-size:12px;font-weight:950;box-shadow:0 8px 16px rgba(7,21,47,.06)}.chatInputBar{flex:0 0 auto;padding:10px max(12px,var(--safe-right)) calc(10px + var(--safe-bottom)) max(12px,var(--safe-left));background:rgba(255,255,255,.95);border-top:1px solid var(--line);box-shadow:0 -12px 34px rgba(7,21,47,.08)}.composer{max-width:900px;margin:0 auto;display:flex;align-items:flex-end;gap:9px;border:1px solid rgba(21,88,214,.17);border-radius:24px;background:#fff;padding:8px 8px 8px 14px;box-shadow:0 10px 24px rgba(7,21,47,.08)}.composer textarea{flex:1;min-height:42px;max-height:138px;border:0;outline:0;resize:none;background:transparent;color:#0f172a;font-size:16px;line-height:1.45;padding:9px 0}.send{appearance:none;border:0;width:44px;height:44px;flex:0 0 44px;border-radius:16px;background:linear-gradient(135deg,#0d3d8d,#1769ff);color:#fff;font-size:23px;font-weight:1000;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 18px rgba(13,61,141,.24)}.send:disabled{opacity:.45;box-shadow:none}.toast{position:fixed;left:50%;bottom:calc(18px + var(--safe-bottom));transform:translateX(-50%);z-index:200;display:none;max-width:min(560px,92vw);padding:12px 14px;border-radius:16px;background:#10223f;color:#fff;box-shadow:0 18px 38px rgba(0,0,0,.3);font-weight:850}.toast.show{display:block}
    .empty{margin:auto;max-width:520px;text-align:center;color:#4b5f80}.empty b{display:block;color:#10223f;font-size:19px;margin-bottom:8px}.empty p{margin:0;line-height:1.55;font-weight:700}
    @keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}@keyframes walk{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-6px) rotate(1deg)}}@keyframes think{0%,100%{transform:scale(1)}50%{transform:scale(1.026)}}@keyframes talk{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.05)}}
    @media (max-width:860px){.brand img{width:48px;height:48px}.brand h1{font-size:22px}.brand p{display:none}.reload{width:48px;height:48px}.stats{padding-top:10px}.stat{flex:1 0 130px;min-width:130px;padding:12px 13px;border-radius:20px}.office{padding:10px 10px calc(14px + var(--safe-bottom))}.stage{min-height:430px;border-radius:26px}.map{background-image:url("/assets/ai-office-final/maps-clean/office-main-mobile.png"),linear-gradient(135deg,#eaf4ff,#fff)}.hint{top:10px;font-size:12px;padding:7px 12px}.agent{width:var(--agent-size-mobile,54px);min-width:64px;min-height:92px}.label{bottom:-27px;font-size:10px;max-width:96px;padding:5px 8px}.bubble{max-width:min(172px,46vw);font-size:12px}.rolechip{min-height:44px;padding-right:12px}.rolechip img{width:30px;height:30px}.chatTitle b{font-size:18px}.chatAvatar{width:44px;height:44px}.message{font-size:15px;max-width:94vw}.composer{border-radius:22px}.composer textarea{font-size:16px}.send{width:44px;height:44px}}
    @media (min-width:1100px){.office{flex-direction:row;align-items:stretch}.stage{min-height:620px;flex:1 1 auto}.rolebar{width:280px;flex:0 0 280px;flex-direction:column;align-items:stretch;overflow:visible;padding:0}.rolechip{border-radius:20px;justify-content:flex-start}.chatBody{padding-left:calc(50vw - 450px);padding-right:calc(50vw - 450px)}}
    @media (max-width:430px){.topbar{padding-left:12px;padding-right:12px}.brand h1{font-size:20px}.stage{min-height:410px}.office{}.agent{min-width:62px;min-height:90px}.message{font-size:14px}.switchers{margin-left:-2px;margin-right:-2px}.switch{padding-left:10px;padding-right:10px}.hint{font-size:11px}}
    @media (prefers-reduced-motion:reduce){.agent,.sprite,.agent-ring{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="page" id="app">
    <header class="topbar">
      <div class="brand">
        <img src="/assets/ai-office-final/brand/logo-mark.png" alt="CWF">
        <div><h1>CWF AI Office</h1><p>เลือกผู้ช่วย แล้วคุยต่อเนื่องแบบเต็มจอ</p></div>
      </div>
      <button class="reload" id="btnRefresh" type="button" aria-label="โหลดข้อมูลใหม่">↻</button>
    </header>
    <section class="stats" aria-label="สถานะงานจริง">
      <div class="stat"><span>งานวันนี้</span><b id="statToday">-</b></div>
      <div class="stat"><span>งานพรุ่งนี้</span><b id="statTomorrow">-</b></div>
      <div class="stat"><span>ยังไม่ปิด</span><b id="statOpen">-</b></div>
      <div class="stat"><span>ยังไม่จ่าย</span><b id="statUnpaid">-</b></div>
    </section>
    <main class="office">
      <section class="stage" id="officeScene" aria-label="CWF AI Office game scene">
        <div class="map"></div>
        <div class="hint">แตะตัวละครเพื่อเริ่มคุย</div>
        <div class="agents" id="agentLayer">
          <button class="agent selected" type="button" data-agent="admin" aria-label="Admin AI"><span class="agent-shadow"></span><span class="agent-ring"></span><img class="sprite" alt=""><span class="label">Admin AI</span><span class="bubble">พร้อมช่วยงานแอดมิน</span></button>
          <button class="agent" type="button" data-agent="sales" aria-label="Sales AI"><span class="agent-shadow"></span><span class="agent-ring"></span><img class="sprite" alt=""><span class="label">Sales AI</span><span class="bubble">พร้อมช่วยฝ่ายขาย</span></button>
          <button class="agent" type="button" data-agent="ops" aria-label="Ops AI"><span class="agent-shadow"></span><span class="agent-ring"></span><img class="sprite" alt=""><span class="label">Ops AI</span><span class="bubble">พร้อมดูคิวงาน</span></button>
          <button class="agent" type="button" data-agent="ads" aria-label="Ads AI"><span class="agent-shadow"></span><span class="agent-ring"></span><img class="sprite" alt=""><span class="label">Ads AI</span><span class="bubble">พร้อมช่วยโฆษณา</span></button>
          <button class="agent" type="button" data-agent="content" aria-label="Content AI"><span class="agent-shadow"></span><span class="agent-ring"></span><img class="sprite" alt=""><span class="label">Content AI</span><span class="bubble">พร้อมทำคอนเทนต์</span></button>
          <button class="agent" type="button" data-agent="dev" aria-label="Dev AI"><span class="agent-shadow"></span><span class="agent-ring"></span><img class="sprite" alt=""><span class="label">Dev AI</span><span class="bubble">พร้อมช่วยระบบ</span></button>
        </div>
      </section>
      <nav class="rolebar" id="rolebar" aria-label="เลือกผู้ช่วย AI"></nav>
    </main>
  </div>

  <section class="chat" id="chatView" aria-label="AI chat full screen" aria-hidden="true">
    <header class="chatTop">
      <div class="chatHead">
        <button class="back" id="btnBack" type="button" aria-label="กลับออฟฟิศ">‹</button>
        <img class="chatAvatar" id="chatAvatar" alt="">
        <div class="chatTitle"><b id="chatName">Admin AI</b><span id="chatRole">ผู้ช่วยแอดมิน Coldwindflow</span></div>
      </div>
      <div class="switchers" id="chatSwitchers" aria-label="เปลี่ยนผู้ช่วย AI"></div>
    </header>
    <div class="chatBody" id="messages"><div class="empty"><b>เลือกผู้ช่วยแล้วคุยต่อเนื่องได้เลย</b><p>ถามเป็นภาษาไทยธรรมชาติ แล้วถามต่อได้ เช่น “วันนี้มีงานอะไรบ้าง” ต่อด้วย “งานไหนเสี่ยงสุด”</p></div></div>
    <footer class="chatInputBar">
      <div class="composer">
        <textarea id="askInput" rows="1" placeholder="พิมพ์ถามต่อได้เลย..."></textarea>
        <button class="send" id="btnAsk" type="button" aria-label="ส่งคำถาม">↑</button>
      </div>
    </footer>
  </section>
  <div class="toast" id="toast"></div>
  <script src="/admin-v2-common.js?v=ai-office-fullscreen-chat-v4-brain-20260607"></script>
  <script src="/admin-ai-office.js?v=ai-office-fullscreen-chat-v4-brain-20260607"></script>
</body>
</html>
