<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    :root{--navy:#0B2E6D;--blue:#1463d9;--yellow:#F4C400;--ink:#0f172a;--muted:#64748b;--line:#d9e2f1;--soft:#f5f8ff;}
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;background:#eef4ff;color:var(--ink);}
    .wrap{max-width:920px;margin:18px auto;padding:0 12px 24px;}
    .slip{background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 18px 45px rgba(11,46,109,.12)}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;padding:18px 18px 16px;background:linear-gradient(135deg,#061a44,var(--navy) 56%,#1677ff);color:#fff;}
    .brand{font-weight:1000;font-size:21px;letter-spacing:.01em;line-height:1.1;}
    .subbrand{font-size:12px;font-weight:800;color:rgba(255,255,255,.82);margin-top:4px;}
    .right{text-align:right;}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;}
    .muted{color:var(--muted);font-size:13px;}.top .muted{color:rgba(255,255,255,.78)}
    .content{padding:16px 18px 20px;}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:12px;}
    .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px 14px;margin-top:12px;}
    .card.soft{background:linear-gradient(180deg,#fff,#f8fbff)}.card.yellow{background:linear-gradient(180deg,#fffdf2,#fff7c8);border-color:rgba(244,196,0,.75)}
    .row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px dashed rgba(15,23,42,.12);align-items:flex-start}.row:last-child{border-bottom:none}
    .row span:first-child{color:var(--muted);font-size:13px}.row b{font-size:14px;color:var(--ink)}.row.total b{font-size:20px;color:var(--navy)}.deposit-row b{color:#0b4bb3;}
    h3{margin:18px 0 9px;font-size:16px;color:var(--navy)}
    table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;}
    th,td{padding:10px;border-bottom:1px solid rgba(15,23,42,.08);font-size:13px;vertical-align:top;}th{background:#f3f6ff;text-align:left;color:#334155;font-size:12px;}tr:last-child td{border-bottom:none}.right{text-align:right}
    .foot{margin-top:14px;font-size:12px;display:flex;justify-content:space-between;gap:12px;align-items:flex-end;}.sign{margin-top:28px;display:grid;grid-template-columns:1fr 1fr;gap:18px}.signBox{border-top:1px solid rgba(15,23,42,.35);padding-top:8px;text-align:center;color:var(--muted);font-size:12px}
    .printbar{position:sticky;bottom:10px;display:flex;justify-content:flex-end;gap:8px;margin-top:12px}.printbar button{background:var(--navy);color:#fff;border:none;border-radius:14px;padding:11px 16px;font-weight:900;cursor:pointer}.printbar button.secondary{background:#fff;color:var(--navy);border:1px solid var(--line)}
    @media (max-width:640px){.top{flex-direction:column}.right{text-align:left}.grid{grid-template-columns:1fr}.wrap{margin:0;padding:0}.slip{border-radius:0;border-left:none;border-right:none}.content{padding:14px}.foot{display:block}.sign{grid-template-columns:1fr}}
    @media print{body{background:#fff}.wrap{max-width:none;margin:0;padding:0}.slip{box-shadow:none;border-radius:0;border:none}.printbar{display:none}.top{-webkit-print-color-adjust:exact;print-color-adjust:exact}.card.yellow{-webkit-print-color-adjust:exact;print-color-adjust:exact} @page{size:A4;margin:12mm}}
  </style>
</head>
<body>
  {{BODY}}
  <script>
    (function(){
      try{
        var qs = new URLSearchParams(location.search);
        if(qs.get('print') === '1') setTimeout(function(){ window.print(); }, 450);
      }catch(e){}
    })();
  </script>
</body>
</html>
