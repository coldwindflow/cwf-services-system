<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CWF Partner Agreement</title>
  <style>
    :root{--navy:#071b49;--blue:#0b56c8;--yellow:#ffd233;--ink:#101828;--muted:#667085;--line:#dbe7ff;--bg:#f4f7fc;--ok:#15803d;--bad:#b91c1c}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans Thai",sans-serif;background:linear-gradient(180deg,var(--navy),var(--blue) 260px,var(--bg) 260px);color:var(--ink)}
    .wrap{max-width:940px;margin:0 auto;padding:28px 14px 72px}.brand{color:#fff;margin:8px 0 18px}.brand h1{margin:0;font-size:31px}.brand p{margin:7px 0 0;color:rgba(255,255,255,.84);font-weight:800}
    .panel{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 14px 34px rgba(2,6,23,.10);padding:18px;margin-bottom:14px}.muted{color:var(--muted);font-weight:800;line-height:1.5}.badge{display:inline-flex;border-radius:999px;padding:7px 12px;font-weight:1000;font-size:13px;background:#e2e8f0}.badge.ok{background:#dcfce7;color:var(--ok)}.badge.warn{background:#fef3c7;color:#92400e}
    .contract{line-height:1.75;border:1px solid var(--line);border-radius:18px;padding:16px;background:#fbfdff;max-height:56vh;overflow:auto}.check{display:flex;gap:10px;align-items:flex-start;margin:14px 0;font-weight:900}.check input{width:22px;height:22px;margin-top:2px}input{width:100%;border:1px solid #c9d7f2;border-radius:14px;padding:12px;font:inherit;font-weight:800}button,.btn{border:0;border-radius:16px;padding:13px 15px;font-weight:1000;cursor:pointer;text-decoration:none;display:inline-flex;justify-content:center}.primary{background:var(--yellow);color:var(--navy)}.ghost{background:#eef4ff;color:var(--navy)}.hidden{display:none}.msg{font-weight:900;margin-top:10px}.msg.err{color:var(--bad)}.msg.ok{color:var(--ok)}
    @media(max-width:720px){.brand h1{font-size:26px}.panel{border-radius:22px}.contract{max-height:58vh}button,.btn{width:100%}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="brand"><h1>CWF Partner Agreement</h1><p>อ่านสัญญาพาร์ทเนอร์และยืนยันลายเซ็น</p></section>
    <section class="panel" id="loadingPanel"><b>กำลังโหลดสัญญา...</b><div class="muted" id="message" style="margin-top:8px">ระบบจะเชื่อมกับใบสมัครของคุณจากแอพช่างหรือหน้าสถานะ</div></section>
    <section class="panel hidden" id="agreementPanel">
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap"><div><h2 id="templateTitle" style="margin:0 0 4px">-</h2><div class="muted" id="applicantName">-</div></div><span class="badge" id="signatureBadge">ยังไม่เซ็น</span></div>
      <div class="contract" id="contractBody" style="margin-top:12px"></div>
      <div id="signatureForm">
        <label class="check"><input id="consent" type="checkbox"><span>ข้าพเจ้าอ่านและยอมรับเงื่อนไขในสัญญาพาร์ทเนอร์ของ CWF</span></label>
        <label for="signerName" style="font-weight:1000;color:var(--navy)">พิมพ์ชื่อ-นามสกุลเป็นลายเซ็น</label>
        <input id="signerName" autocomplete="name" placeholder="ชื่อ-นามสกุลตรงกับใบสมัคร">
        <button class="primary" id="btnSign" type="button" style="margin-top:12px">เซ็นสัญญา</button>
      </div>
    </section>
  </main>
  <script src="/partner-agreement.js?v=partner-flow-final"></script>
</body>
</html>
