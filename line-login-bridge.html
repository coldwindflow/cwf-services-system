<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>กำลังเข้าสู่ระบบ - CWF</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(180deg,#071b49,#0b55c7);font-family:Arial,"Noto Sans Thai",sans-serif;color:#fff}
    .box{width:min(420px,calc(100% - 28px));background:#fff;color:#0f172a;border-radius:26px;padding:24px;box-shadow:0 18px 42px rgba(0,0,0,.22);text-align:center}
    .logo{width:64px;height:64px;border-radius:18px;object-fit:contain;margin-bottom:12px}
    h1{font-size:24px;margin:0 0 8px;color:#071b49}.muted{color:#64748b;font-weight:800;line-height:1.6}.spinner{width:38px;height:38px;border:4px solid #dbe7ff;border-top-color:#0b55c7;border-radius:50%;animation:spin 1s linear infinite;margin:16px auto}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="box">
    <img src="/logo.png" class="logo" alt="CWF">
    <h1>กำลังเข้าสู่ระบบ</h1>
    <div class="muted">กรุณารอสักครู่ ระบบกำลังพาไปหน้าแอพ</div>
    <div class="spinner"></div>
  </div>
<script>
  (function(){
    const qs = new URLSearchParams(location.search);
    const username = qs.get('username') || '';
    const role = qs.get('role') || '';
    const to = qs.get('to') || '/login.html';
    if (username && role) {
      localStorage.setItem('username', username);
      localStorage.setItem('role', role);
      try {
        const expMs = Date.now() + 7 * 24 * 60 * 60 * 1000;
        const payload = btoa(unescape(encodeURIComponent(JSON.stringify({ u:username, r:role, exp:expMs }))));
        const secure = location.protocol === 'https:' ? '; Secure' : '';
        document.cookie = `cwf_auth=${payload}; Max-Age=${7*24*60*60}; Path=/; SameSite=Lax${secure}`;
      } catch(e) {}
    }
    setTimeout(()=>location.replace(to), 350);
  })();
</script>
</body>
</html>
