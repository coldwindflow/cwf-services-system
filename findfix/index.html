<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FindFix | Workspace Platform</title>
  <meta name="description" content="FindFix - แพลตฟอร์มจัดการธุรกิจบริการแบบแยกร้านในระบบเดียว" />
  <link rel="icon" type="image/png" href="./assets/logo-findfix.png" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <main id="app" class="ff-shell" aria-live="polite"></main>

  <template id="login-template">
    <section class="login-screen">
      <div class="fx-grid" aria-hidden="true"></div>
      <div class="orb orb-a" aria-hidden="true"></div>
      <div class="orb orb-b" aria-hidden="true"></div>
      <div class="orb orb-c" aria-hidden="true"></div>

      <div class="brand-stage">
        <div class="brand-panel glass-card">
          <div class="hero-brand-row">
            <img class="logo-hero" src="./assets/logo-findfix.png" alt="FindFix logo" />
            <div>
              <p class="eyebrow">Service business workspace platform</p>
              <h1>Find<span>Fix</span></h1>
              <p class="hero-copy">โครงแอพ FindFix แบบแยกจาก CWF เดิม เพื่อให้ต่อยอดเป็นระบบจริงได้ในอนาคต ทั้งการแยกร้าน การจัดการงาน ช่าง ลูกค้า รายได้ และการตั้งค่าร้านในแพลตฟอร์มเดียว</p>
            </div>
          </div>
          <div class="hero-actions">
            <button class="primary" data-action="quick-login" data-role="owner">เข้าใช้งานตัวอย่าง</button>
            <button class="ghost" data-action="seed-reset">รีเซ็ตข้อมูล Demo</button>
          </div>
          <div class="hero-feature-grid">
            <article class="hero-feature-card">
              <span class="feature-kicker">Multi Workspace</span>
              <strong>แยกร้านในระบบเดียว</strong>
              <p>แต่ละร้านมีช่าง งาน ลูกค้า และการตั้งค่าแยกกันชัดเจน</p>
            </article>
            <article class="hero-feature-card">
              <span class="feature-kicker">Operations</span>
              <strong>งาน ช่าง รายได้</strong>
              <p>เป็นฐานต่อยอดไปสู่ระบบจริงแบบ SaaS หรือ White-label ได้ต่อ</p>
            </article>
            <article class="hero-feature-card">
              <span class="feature-kicker">Safe Prototype</span>
              <strong>ไม่กระทบ CWF เดิม</strong>
              <p>เก็บข้อมูล Demo ใน localStorage และวางแยกเป็นโครงใหม่โดยเฉพาะ</p>
            </article>
          </div>
        </div>
      </div>

      <form class="login-card" data-form="login">
        <div class="card-top">
          <div>
            <p class="eyebrow">Secure workspace</p>
            <h2>เข้าสู่ FindFix</h2>
            <p class="card-subtext">เลือก Workspace และบทบาท เพื่อจำลองการเข้าใช้งานระบบจริง</p>
          </div>
          <span class="status-pill">Demo Ready</span>
        </div>

        <div class="inline-brand-pill">
          <img class="logo-chip" src="./assets/logo-findfix.png" alt="FindFix" />
          <div>
            <strong>FindFix</strong>
            <small>Independent app shell</small>
          </div>
        </div>

        <label>เลือกร้าน / Workspace</label>
        <select name="tenant" id="tenantSelect"></select>

        <label>บทบาทผู้ใช้</label>
        <select name="role">
          <option value="owner">เจ้าของร้าน</option>
          <option value="admin">แอดมินร้าน</option>
          <option value="accountant">บัญชี</option>
          <option value="tech">ช่าง</option>
          <option value="platform">Platform Owner</option>
        </select>

        <label>ชื่อผู้ใช้</label>
        <input name="displayName" value="Demo User" autocomplete="name" />

        <button class="primary wide" type="submit">เข้าใช้งาน</button>
        <p class="mini-note">โครงนี้แยกจาก Admin CWF เดิม 100% และเก็บข้อมูล Demo ใน localStorage เท่านั้น เพื่อพัฒนาต่อเป็นระบบจริงโดยไม่กระทบร้านเดิม</p>
      </form>
    </section>
  </template>

  <template id="app-template">
    <section class="app-frame">
      <aside class="sidebar">
        <a class="side-brand" href="#/dashboard" aria-label="FindFix home">
          <img class="logo-side" src="./assets/logo-findfix.png" alt="FindFix logo" />
          <span class="brand-wording"><strong>Find<span>Fix</span></strong><small>Workspace Platform</small></span>
        </a>
        <nav class="nav-list" aria-label="FindFix navigation">
          <button data-route="dashboard">ภาพรวม</button>
          <button data-route="workspaces">ร้าน/สาขา</button>
          <button data-route="jobs">งานบริการ</button>
          <button data-route="technicians">ช่าง</button>
          <button data-route="customers">ลูกค้า</button>
          <button data-route="finance">รายได้</button>
          <button data-route="settings">ตั้งค่า</button>
        </nav>
        <div class="tenant-card compact">
          <small>Active Workspace</small>
          <strong id="sideTenantName">-</strong>
          <span id="sideTenantCode">-</span>
        </div>
      </aside>

      <section class="main-panel">
        <header class="topbar">
          <button class="hamburger" data-action="toggle-menu" aria-label="เปิดเมนู">☰</button>
          <div class="topbar-brand-pill">
            <img class="logo-chip" src="./assets/logo-findfix.png" alt="FindFix" />
            <div>
              <strong>FindFix</strong>
              <small>Workspace Control Center</small>
            </div>
          </div>
          <div class="workspace-select">
            <small>Workspace</small>
            <select id="workspaceSwitcher"></select>
          </div>
          <div class="top-actions">
            <button class="ghost small" data-action="copy-link">คัดลอกลิงก์ร้าน</button>
            <button class="danger small" data-action="logout">ออกจากระบบ</button>
          </div>
        </header>

        <section id="page" class="page"></section>
      </section>
    </section>
  </template>

  <script src="./app.js"></script>
</body>
</html>
