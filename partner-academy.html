<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CWF Partner Academy</title><style>
:root{--navy:#071b49;--blue:#0b4bb3;--yellow:#ffd233;--ink:#0f172a;--muted:#64748b;--line:#dbe7ff;--bg:#f5f8fd;--ok:#166534;--bad:#991b1b}*{box-sizing:border-box}body{margin:0;font-family:Arial,'Noto Sans Thai',sans-serif;background:linear-gradient(180deg,var(--navy),var(--blue) 250px,var(--bg) 250px);color:var(--ink)}.wrap{max-width:920px;margin:0 auto;padding:24px 14px 80px}.hero{color:#fff;margin:6px 0 18px}.hero h1{margin:0;font-size:30px}.hero p{margin:8px 0 0;color:rgba(255,255,255,.86);font-weight:800;line-height:1.55}.panel{background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:0 16px 36px rgba(7,27,73,.10);padding:18px;margin-bottom:14px}.lesson,.question{border:1px solid var(--line);border-radius:20px;padding:15px;background:#fff;margin:12px 0}.lesson b,.question b{font-size:18px;color:var(--navy)}.muted{color:var(--muted);font-weight:800}.badge{display:inline-flex;border-radius:999px;padding:6px 10px;font-weight:1000;font-size:12px;background:#e2e8f0}.badge.ok{background:#dcfce7;color:var(--ok)}button{border:0;border-radius:16px;padding:12px 15px;font-weight:1000;cursor:pointer}.primary{background:var(--yellow);color:var(--navy)}.secondary{background:var(--blue);color:#fff}.ghost{background:#eef4ff;color:var(--navy)}.choices{display:grid;gap:8px;margin-top:10px}.choice{display:flex;gap:8px;font-weight:850}.choice input{width:20px}.hidden{display:none}.msg{font-weight:900}.err{color:var(--bad)}@media(max-width:700px){.hero h1{font-size:25px}.panel{border-radius:22px}}
</style></head><body><main class="wrap"><section class="hero"><h1>CWF Partner Academy</h1><p>อบรมพื้นฐานและทำข้อสอบ Basic Partner</p></section><section class="panel"><h2 id="courseTitle">กำลังโหลด Academy...</h2><div class="muted" id="applicantName"></div><div id="message" class="msg"></div><div style="margin-top:12px"><span class="badge" id="progressBadge">0%</span></div></section><section class="panel hidden" id="academyPanel"><div id="lessons"></div><hr><h2>ข้อสอบ Basic Partner</h2><div id="examBox"><button class="secondary" id="btnLoadExam" type="button">โหลดข้อสอบ</button></div></section></main><script src="/partner-academy.js?v=real-flow-final"></script></body></html>
