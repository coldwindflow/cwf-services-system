<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- ✅ PWA (Phase 2) -->
  <link rel="manifest" href="/mainfest.json">
  <meta name="theme-color" content="#0b5ed7">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icon-180.png">

  <title>Login - CWF</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-yellowblue" data-theme-lock="yellowblue">

  <div class="app">
    <div class="topbar">
      <div class="brand">
        <!-- ✅ ใช้ absolute path -->
        <img src="/logo.png" alt="CWF">
        <div class="title">
          <b>CWF – Smart Field Service</b>
          <span>เข้าสู่ระบบ</span>
        </div>
      </div>
      <span class="badge wait">🔒 Secure</span>
    </div>

    <div class="card">
      <h2>เข้าสู่ระบบ</h2>
      <p class="muted" style="margin:6px 0 14px;">สำหรับ Admin / Technician</p>

      <label for="u">Username</label>
      <input id="u" placeholder="เช่น admin / tech1" autocomplete="username">

      <label for="p" style="margin-top:10px;">Password</label>
      <input id="p" type="password" placeholder="รหัสผ่าน" autocomplete="current-password">

      <div class="row" style="margin-top:12px;">
        <button onclick="login()">Login</button>
      </div>

      <p class="muted" style="margin-top:10px;">
        ถ้าเข้าไม่ได้ ให้เช็ค username/password ในฐานข้อมูล (users)
      </p>
    </div>
  </div>

<script>
  // ✅ ใช้ origin เดียวกับที่เปิดอยู่ (HTTP/HTTPS/พอร์ตไหนก็ได้)
  const API_BASE = window.location.origin;


  // ✅ Auto-restore session เมื่อเปิดแอพใหม่/รีเฟรช (กันเหมือนหลุดล็อกอิน)
  function getCookie(name){
    try{
      return document.cookie.split(";").map(s=>s.trim()).find(s=>s.startsWith(name+"="))?.split("=").slice(1).join("=") || "";
    }catch{ return ""; }
  }
  function restoreAuthFromCookie(){
    try{
      if (localStorage.getItem("username") && localStorage.getItem("role")) return;
      const raw = getCookie("cwf_auth");
      if (!raw) return;
      const obj = JSON.parse(decodeURIComponent(escape(atob(raw))));
      if (!obj || !obj.u || !obj.r) return;
      if (obj.exp && Date.now() > Number(obj.exp)) return;
      localStorage.setItem("username", obj.u);
      localStorage.setItem("role", obj.r);
    }catch{}
  }
  function redirectIfAlreadyLoggedIn(){
    const role = localStorage.getItem("role");
    if (role === "super_admin") location.replace("/admin-super-v2.html");
    else if (role === "admin") location.replace("/admin-dashboard-v2.html");
    if (role === "technician") location.replace("/tech.html");
  }
  restoreAuthFromCookie();

  // ✅ Prevent login bounce loop:
  // If localStorage/cookie says logged in but server session is gone, clear and stay on login.
  (async function validateAndRedirect(){
    try{
      const role = localStorage.getItem('role');
      if (!role) return;
      const r = await fetch(`${API_BASE}/api/auth/me`, { credentials: 'include' });
      if (!r.ok) throw new Error('UNAUTHORIZED');
      const d = await r.json().catch(()=>null);
      if (!d || !d.ok) throw new Error('UNAUTHORIZED');
      // sync role/username from server (supports impersonation-safe)
      localStorage.setItem('username', d.username);
      localStorage.setItem('role', d.role);
      redirectIfAlreadyLoggedIn();
    }catch(_){
      try{ localStorage.removeItem('username'); localStorage.removeItem('role'); }catch(e){}
      try{ sessionStorage.removeItem('cwf_logged_out'); }catch(e){}
    }
  })();

  async function login() {
    try {
      const res = await fetch(`${API_BASE}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: u.value.trim(),
          password: p.value
        })
      });

      const d = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(d.error || "login failed");

      localStorage.setItem("username", d.username);
      localStorage.setItem("role", d.role);

      // ✅ Persist auth fallback (cookie) เพื่อกันเคส localStorage หลุดในบางเครื่อง/PWA
      // - เก็บแค่ username/role + exp (ไม่ใช่ข้อมูลลับ)
      try {
        const expMs = Date.now() + 7 * 24 * 60 * 60 * 1000; // 7 วัน
        const payload = btoa(unescape(encodeURIComponent(JSON.stringify({ u: d.username, r: d.role, exp: expMs }))));
        const secure = (location.protocol === "https:") ? "; Secure" : "";
        document.cookie = `cwf_auth=${payload}; Max-Age=${7 * 24 * 60 * 60}; Path=/; SameSite=Lax${secure}`;
      } catch (e) {}

      // NOTE: เคยมีโค้ดที่ "ลบ cookie" ทิ้งทันทีหลัง set (ทำให้แอดมิน/ช่างไม่มี cwf_auth)
      // ส่งผลให้ API ที่ต้องอ่าน cookie (เช่น admin-only rank update) ถูก 401/403
      // จึงลบส่วนที่ clear cookie ออก และคง cookie ไว้ตาม Max-Age ที่กำหนด

      if (d.role === "super_admin") location.href = "/admin-super-v2.html";
      else if (d.role === "admin") location.href = "/admin-dashboard-v2.html";
      if (d.role === "technician") location.href = "/tech.html";
      if (!d.role) alert("Login ผ่าน แต่ไม่มี role ในระบบ");
    } catch (err) {
      alert(`❌ ${err.message}`);
    }
  }
</script>


<script>
  // ✅ Register Service Worker (เพื่อให้เปิดแบบ PWA เสถียร)
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }
</script>

</body>
</html>
