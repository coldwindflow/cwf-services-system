<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>สัญญาพาร์ทเนอร์ช่าง CWF</title>
<style>
:root{--navy:#071b49;--blue:#0b56d8;--yellow:#ffd233;--ink:#10203b;--muted:#64748b;--line:#dbe7ff;--bg:#f5f8fd;--ok:#168048;--bad:#b91c1c}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans Thai",sans-serif;background:linear-gradient(180deg,var(--navy),#0d56c9 260px,var(--bg) 260px);color:var(--ink)}.wrap{max-width:920px;margin:0 auto;padding:26px 14px 80px}.hero{color:#fff;padding:10px 0 18px}.back{color:#fff;text-decoration:none;font-weight:900;display:inline-flex;margin-bottom:16px}.hero h1{font-size:30px;line-height:1.15;margin:0}.hero p{margin:8px 0 0;color:rgba(255,255,255,.86);font-weight:800;line-height:1.55}.panel{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 18px 44px rgba(7,27,73,.12);padding:18px;margin-bottom:16px}.applicant{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field{background:#f8fbff;border:1px solid #dbe7ff;border-radius:16px;padding:12px}.field span{display:block;color:var(--muted);font-size:12px;font-weight:900;margin-bottom:4px}.field b{font-size:15px}.badge{display:inline-flex;border-radius:999px;padding:7px 11px;font-weight:1000;font-size:12px;background:#e2e8f0}.ok{background:#dcfce7;color:#166534}.warn{background:#fff0c2;color:#8a4d00}.contract h2{margin:0 0 10px;font-size:24px;color:var(--navy)}.contract h3{font-size:20px;margin:18px 0 9px;color:var(--navy)}.contract p,.contract li{font-weight:800;line-height:1.72;color:#263c5d}.contract ul{padding-left:22px}.contract-rate-table{width:100%;border-collapse:separate;border-spacing:0;margin:12px 0;border:1px solid var(--line);border-radius:16px;overflow:hidden}.contract-rate-table th{background:#eef4ff;color:#0b356d}.contract-rate-table th,.contract-rate-table td{padding:10px;border-bottom:1px solid var(--line);font-weight:900;text-align:left;font-size:13px}.contract-rate-table tr:last-child td{border-bottom:0}.sign-box{display:grid;gap:12px}.check{display:flex;gap:10px;align-items:flex-start;font-weight:900}.check input{width:22px;height:22px;flex:0 0 auto}.input{width:100%;border:2px solid #d6e2fa;border-radius:16px;padding:13px;font:inherit;font-weight:800}.canvas-wrap{border:2px dashed #cfe0ff;border-radius:20px;background:#fbfdff;padding:12px}.signature-canvas{width:100%;height:160px;background:#fff;border-radius:14px;display:block;touch-action:none;border:1px solid #e1eafe}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:16px;padding:13px 16px;font-weight:1000;text-decoration:none;display:inline-flex;justify-content:center;cursor:pointer}.primary{background:var(--yellow);color:var(--navy)}.secondary{background:var(--blue);color:#fff}.ghost{background:#edf3ff;color:var(--navy)}.msg{font-weight:900;margin-top:10px}.err{color:var(--bad)}.success{color:var(--ok)}.hidden{display:none}@media(max-width:650px){.hero h1{font-size:26px}.panel{padding:15px;border-radius:24px}.applicant{grid-template-columns:1fr}.contract h2{font-size:21px}.actions{display:grid}.btn{width:100%}.contract-rate-table{font-size:12px;display:block;overflow:auto;white-space:nowrap}}</style></head>
<body><main class="wrap"><section class="hero"><a class="back" href="/tech.html">‹ กลับหน้าแอพช่าง</a><h1>สัญญาพาร์ทเนอร์ช่าง CWF</h1><p>อ่านรายละเอียดให้ครบ แล้วเซ็นลายมือชื่อบนหน้าจอเพื่อยืนยันสัญญา</p></section>
<section class="panel hidden" id="agreementPanel"><div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start"><div><h2 id="templateTitle" style="margin:0;color:var(--navy)">สัญญาพาร์ทเนอร์ช่าง</h2><div id="applicantName" style="color:var(--muted);font-weight:900;margin-top:4px"></div></div><span class="badge warn" id="signatureBadge">ยังไม่เซ็น</span></div></section>
<section class="panel hidden" id="applicantPanel"><div class="applicant" id="applicantGrid"></div></section>
<section class="panel hidden"><div id="contractBody" class="contract"></div></section>
<section class="panel hidden" id="signatureForm"><div class="sign-box"><label class="check"><input id="consent" type="checkbox"><span>ข้าพเจ้าได้อ่าน เข้าใจ และยอมรับเงื่อนไขทั้งหมดในสัญญานี้แล้ว</span></label><div><label style="font-weight:1000">พิมพ์ชื่อ-นามสกุลเพื่อยืนยัน</label><input class="input" id="signerName" placeholder="ชื่อ-นามสกุล"></div><div class="canvas-wrap"><div style="font-weight:1000;margin-bottom:8px">ลายเซ็นบนหน้าจอ</div><canvas id="signatureCanvas" class="signature-canvas"></canvas><div class="actions" style="margin-top:10px"><button class="btn ghost" id="clearSignature" type="button">ล้างลายเซ็น</button></div></div><div class="actions"><button class="btn primary" id="btnSign" type="button">ยืนยันและเซ็นสัญญา</button><a class="btn ghost" href="/tech.html">กลับหน้าแอพช่าง</a></div></div></section><div id="message" class="msg"></div></main><script src="/partner-agreement.js?v=polished-signature-final"></script></body></html>
