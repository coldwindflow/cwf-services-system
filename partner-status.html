<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>อัปโหลดเอกสารพาร์ทเนอร์ CWF</title>
<style>
:root{--navy:#071b49;--blue:#0b56d8;--yellow:#ffd233;--ink:#10203b;--muted:#64748b;--line:#dbe7ff;--bg:#f5f8fd;--ok:#168048;--warn:#a15c00;--bad:#b91c1c}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans Thai",sans-serif;background:linear-gradient(180deg,var(--navy),#0d56c9 260px,var(--bg) 260px);color:var(--ink)}.wrap{max-width:820px;margin:0 auto;padding:26px 14px 76px}.hero{color:#fff;padding:10px 0 18px}.back{color:#fff;text-decoration:none;font-weight:900;display:inline-flex;margin-bottom:16px}.hero h1{margin:0;font-size:32px;line-height:1.15}.hero p{margin:8px 0 0;color:rgba(255,255,255,.86);font-weight:800;line-height:1.55}.panel{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 18px 44px rgba(7,27,73,.12);padding:18px;margin-bottom:16px}.profile{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.profile h2{margin:0;font-size:24px}.muted{color:var(--muted);font-weight:800}.badge{display:inline-flex;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:1000;background:#e2e8f0}.ok{background:#dcfce7;color:#166534}.warn{background:#fff0c2;color:#8a4d00}.bad{background:#fee2e2;color:#991b1b}.doc-list{display:grid;gap:14px}.doc{display:grid;grid-template-columns:54px 1fr;gap:14px;border:1px solid var(--line);border-radius:22px;padding:16px;background:#fff;box-shadow:0 8px 22px rgba(15,31,68,.05)}.doc-icon{width:54px;height:54px;border-radius:18px;background:#eef4ff;display:flex;align-items:center;justify-content:center;font-size:26px}.doc h3{margin:0;font-size:20px}.doc p{margin:6px 0;color:var(--muted);font-size:13px;font-weight:800;line-height:1.45}.upload-row{display:grid;gap:9px;margin-top:10px}.file{border:2px dashed #cfe0ff;border-radius:16px;padding:13px;background:#f8fbff}.file input{width:100%;font-weight:800}.upload-btn{border:0;border-radius:16px;background:var(--blue);color:#fff;padding:13px;font-size:16px;font-weight:1000}.ghost{border:0;border-radius:16px;background:#edf3ff;color:var(--navy);padding:13px;font-size:16px;font-weight:1000;text-decoration:none;display:flex;justify-content:center}.info{background:#eef7ff;border:1px solid #cce7ff;border-radius:20px;padding:14px;color:#315070;font-weight:800;line-height:1.6}.hidden{display:none}.msg{font-weight:900;margin-top:10px;color:#fff}.footer-actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}@media(max-width:600px){.wrap{padding:22px 12px 70px}.hero h1{font-size:28px}.panel{border-radius:24px;padding:16px}.doc{grid-template-columns:1fr}.doc-icon{width:50px;height:50px}.profile{display:block}.profile .badge{margin-top:10px}}</style></head>
<body><main class="wrap"><section class="hero"><a class="back" href="/tech.html">‹ กลับหน้าแอพช่าง</a><h1>อัปโหลดเอกสาร</h1><p>อัปโหลดเอกสารให้ครบเพื่อใช้ตรวจสอบตัวตนและปลดล็อกขั้นตอนถัดไป</p><div class="msg" id="message"></div></section>
<section class="panel hidden" id="profilePanel"><div class="profile"><div><h2 id="appName">-</h2><div class="muted" id="appMeta">-</div></div><span class="badge warn" id="appStatus">รอตรวจ</span></div></section>
<section class="panel"><div class="info">ไฟล์ที่รองรับ: JPG, PNG, WEBP หรือ PDF ขนาดไม่เกิน 8MB ต่อไฟล์ ข้อมูลจะใช้สำหรับการตรวจสอบพาร์ทเนอร์ CWF เท่านั้น</div></section>
<section class="panel"><div class="doc-list" id="documentCards"></div><div class="footer-actions"><a class="ghost" href="/tech.html">กลับหน้าแอพช่าง</a></div></section>
<script src="/partner-status.js?v=polished-docs-final"></script>
    <section class="panel">
      <div class="actions" style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn secondary" href="/partner-dashboard.html">กลับ Partner Dashboard</a>
        <a class="btn ghost" href="/tech.html">กลับหน้าแอพช่าง</a>
      </div>
    </section>
  </main></body></html>
