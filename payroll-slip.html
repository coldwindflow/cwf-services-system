<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; margin:0; background:#f6f8fb; color:#0f172a;}
    .wrap{max-width:920px; margin:18px auto; padding:0 12px;}
    .top{display:flex; justify-content:space-between; gap:12px; align-items:flex-end;}
    .brand{font-weight:800; font-size:18px;}
    .muted{color:rgba(15,23,42,0.65); font-size:13px;}
    .right{text-align:right;}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;}
    h3{margin:16px 0 8px; font-size:15px;}
    .card{background:#fff; border:1px solid rgba(15,23,42,0.10); border-radius:16px; padding:12px; margin-top:10px;}
    .row{display:flex; justify-content:space-between; gap:12px; padding:6px 0; border-bottom:1px dashed rgba(15,23,42,0.10);}
    .row:last-child{border-bottom:none;}
    table{width:100%; border-collapse:collapse; background:#fff; border:1px solid rgba(15,23,42,0.10); border-radius:16px; overflow:hidden;}
    th,td{padding:10px; border-bottom:1px solid rgba(15,23,42,0.08); font-size:13px; vertical-align:top;}
    th{background:#f3f6ff; text-align:left;}
    tr:last-child td{border-bottom:none;}
    .right{text-align:right;}
    .foot{margin-top:14px; font-size:12px;}
    .printbar{position:sticky; bottom:10px; display:flex; justify-content:flex-end; margin-top:12px;}
    .printbar button{background:#0b4bb3; color:#fff; border:none; border-radius:12px; padding:10px 14px; font-weight:700; cursor:pointer;}

    @media print{
      body{background:#fff;}
      .printbar{display:none;}
      .wrap{max-width:none; margin:0;}
    }
  </style>
</head>
<body>
  {{BODY}}
</body>
</html>
