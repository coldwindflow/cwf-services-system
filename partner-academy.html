<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CWF Partner Academy</title>
  <style>
    :root{--navy:#071b49;--blue:#0b56c8;--yellow:#ffd233;--ink:#101828;--muted:#667085;--line:#dbe7ff;--bg:#f4f7fc;--ok:#15803d;--bad:#b91c1c}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans Thai",sans-serif;background:linear-gradient(180deg,var(--navy),var(--blue) 260px,var(--bg) 260px);color:var(--ink)}.wrap{max-width:1040px;margin:0 auto;padding:28px 14px 72px}.brand{color:#fff;margin:8px 0 18px}.brand h1{margin:0;font-size:31px}.brand p{margin:7px 0 0;color:rgba(255,255,255,.84);font-weight:800}.panel{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 14px 34px rgba(2,6,23,.10);padding:18px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.lesson,.question{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}.muted{color:var(--muted);font-weight:800;line-height:1.5}.badge{display:inline-flex;border-radius:999px;padding:7px 12px;font-weight:1000;font-size:13px;background:#e2e8f0}.badge.ok{background:#dcfce7;color:var(--ok)}.badge.bad{background:#fee2e2;color:var(--bad)}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.choices{display:grid;gap:8px;margin-top:8px}.choice{display:flex;gap:8px;align-items:flex-start;font-weight:800}.choice input{width:auto;margin-top:3px}button{border:0;border-radius:16px;padding:12px 14px;font-weight:1000;cursor:pointer}.primary{background:var(--yellow);color:var(--navy)}.ghost{background:#eef4ff;color:var(--navy)}.hidden{display:none}.msg{font-weight:900;margin-top:10px}.msg.err{color:var(--bad)}.msg.ok{color:var(--ok)}@media(max-width:760px){.grid{grid-template-columns:1fr}.brand h1{font-size:26px}.panel{border-radius:22px}.top{display:block}button{width:100%}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="brand"><h1>CWF Partner Academy</h1><p>เรียนบทเรียนพื้นฐานและทำแบบทดสอบ Basic Partner</p></section>
    <section class="panel" id="loadingPanel"><b>กำลังโหลด Academy...</b><div id="message" class="msg" style="margin-top:8px">ระบบจะเชื่อมกับใบสมัครของคุณจากแอพช่างหรือหน้าสถานะ</div></section>
    <section class="panel hidden" id="academyPanel"><div class="top"><div><h2 id="courseTitle" style="margin:0">-</h2><div class="muted" id="applicantName">-</div></div><span class="badge" id="progressBadge">0%</span></div><div class="grid" id="lessons" style="margin-top:12px"></div></section>
    <section class="panel hidden" id="examPanel"><div class="top"><div><h2 style="margin:0">แบบทดสอบ</h2><div class="muted" id="examMeta">ผ่านที่ 80%</div></div><button class="primary" id="btnSubmitExam" type="button">ส่งข้อสอบ</button></div><div id="questions" style="display:grid;gap:10px;margin-top:12px"></div></section>
  </main>
  <script src="/partner-academy.js?v=partner-flow-final"></script>
</body>
</html>
